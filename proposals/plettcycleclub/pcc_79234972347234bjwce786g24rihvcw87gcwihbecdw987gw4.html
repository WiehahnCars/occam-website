  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #0a0a0a; --dark: #111111; --card: #1a1a1a; --border: #2a2a2a;
      --accent: #e8ff3e; --accent2: #ff6b35; --text: #f0f0f0; --muted: #888;
      --green: #4ade80; --red: #f87171; --amber: #fbbf24; --radius: 12px;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--black); color: var(--text); line-height: 1.6; overflow-x: hidden; }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: var(--dark); } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .font-display { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.04em; }
    .font-mono { font-family: 'DM Mono', monospace; }
    /* NAV */
    .nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(10,10,10,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
    .nav-inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; height: 64px; display: flex; align-items: center; justify-content: space-between; }
    .nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 0.08em; color: var(--accent); cursor: pointer; display: flex; align-items: center; gap: 8px; background: none; border: none; }
    .nav-links { display: flex; align-items: center; gap: 6px; }
    .nav-link { background: none; border: none; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; padding: 8px 12px; border-radius: 8px; transition: all 0.2s; }
    .nav-link:hover { color: var(--text); background: rgba(255,255,255,0.05); }
    .nav-link.active { color: var(--accent); }
    .btn-nav-join { background: var(--accent); color: var(--black); border: none; padding: 8px 18px; border-radius: 8px; font-weight: 700; font-size: 14px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
    .btn-nav-join:hover { opacity: 0.85; transform: translateY(-1px); }
    .mobile-toggle { display: none; background: none; border: none; color: var(--text); cursor: pointer; font-size: 22px; padding: 6px; }
    .mobile-menu { display: none; position: fixed; inset: 0; z-index: 99; background: var(--dark); padding: 80px 24px 24px; flex-direction: column; gap: 8px; overflow-y: auto; }
    .mobile-menu.open { display: flex; }
    .mobile-menu .nav-link { font-size: 18px; padding: 14px 16px; }
    /* BUTTONS */
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 24px; border-radius: 10px; font-weight: 600; font-size: 15px; cursor: pointer; transition: all 0.2s; border: none; font-family: 'DM Sans', sans-serif; }
    .btn-primary { background: var(--accent); color: var(--black); }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(232,255,62,0.3); }
    .btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
    .btn-sm { padding: 7px 14px; font-size: 13px; border-radius: 8px; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
    /* LAYOUT */
    .section { max-width: 1200px; margin: 0 auto; padding: 80px 24px; }
    .section-label { font-size: 12px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; }
    .section-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(36px, 5vw, 60px); line-height: 1; margin-bottom: 16px; }
    /* CARDS */
    .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; }
    .card-hover { transition: all 0.2s; cursor: pointer; }
    .card-hover:hover { border-color: rgba(232,255,62,0.3); transform: translateY(-2px); }
    /* HERO */
    .hero { min-height: 100vh; background: linear-gradient(160deg, #0a0a0a 0%, #1a1208 50%, #0a0a0a 100%); display: flex; align-items: center; padding-top: 64px; position: relative; overflow: hidden; }
    .hero-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(232,255,62,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(232,255,62,0.03) 1px, transparent 1px); background-size: 60px 60px; pointer-events: none; }
    .hero-glow { position: absolute; width: 600px; height: 600px; border-radius: 50%; background: radial-gradient(circle, rgba(232,255,62,0.08) 0%, transparent 70%); top: 20%; right: -10%; pointer-events: none; }
    .hero-emoji { position: absolute; right: 5%; top: 50%; transform: translateY(-50%); opacity: 0.04; font-size: 300px; line-height: 1; pointer-events: none; user-select: none; }
    .hero-content { max-width: 1200px; margin: 0 auto; padding: 80px 24px; position: relative; z-index: 1; }
    .hero-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(232,255,62,0.1); border: 1px solid rgba(232,255,62,0.3); color: var(--accent); padding: 6px 14px; border-radius: 100px; font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 24px; }
    .hero-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(64px, 10vw, 120px); line-height: 0.9; letter-spacing: 0.02em; margin-bottom: 24px; }
    .hero-title span { color: var(--accent); }
    .hero-subtitle { font-size: 18px; color: var(--muted); max-width: 500px; margin-bottom: 40px; line-height: 1.7; }
    .hero-actions { display: flex; gap: 16px; flex-wrap: wrap; }
    .hero-stats { display: flex; gap: 48px; margin-top: 80px; padding-top: 48px; border-top: 1px solid var(--border); flex-wrap: wrap; }
    .stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 48px; color: var(--accent); line-height: 1; }
    .stat-label { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    /* FORMS */
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em; }
    .form-input { width: 100%; background: var(--dark); border: 1px solid var(--border); border-radius: 8px; padding: 11px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; transition: all 0.2s; outline: none; }
    .form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(232,255,62,0.1); }
    .form-input::placeholder { color: #555; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    /* BADGES */
    .badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 100px; font-size: 11px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }
    .badge-paid { background: rgba(74,222,128,0.15); color: var(--green); border: 1px solid rgba(74,222,128,0.3); }
    .badge-unpaid { background: rgba(248,113,113,0.15); color: var(--red); border: 1px solid rgba(248,113,113,0.3); }
    .badge-admin { background: rgba(232,255,62,0.15); color: var(--accent); border: 1px solid rgba(232,255,62,0.3); }
    /* TABLE */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 12px 16px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); border-bottom: 1px solid var(--border); }
    td { padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 14px; }
    tr:hover td { background: rgba(255,255,255,0.02); }
    /* DASHBOARD */
    .dash-layout { min-height: 100vh; padding-top: 64px; }
    .dash-content { max-width: 1100px; margin: 0 auto; padding: 40px 24px; }
    .metric-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 24px; }
    .metric-val { font-family: 'Bebas Neue', sans-serif; font-size: 40px; line-height: 1; }
    .metric-label { font-size: 13px; color: var(--muted); margin-top: 4px; }
    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .modal { background: var(--dark); border: 1px solid var(--border); border-radius: 16px; padding: 32px; max-width: 480px; width: 100%; max-height: 90vh; overflow-y: auto; }
    .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 32px; margin-bottom: 8px; }
    /* PAYSTACK MOCK */
    .paystack-card { background: #0052cc; color: white; border-radius: 12px; padding: 24px; margin: 20px 0; }
    /* ALERTS */
    .alert { padding: 14px 18px; border-radius: 10px; display: flex; gap: 12px; align-items: flex-start; margin-bottom: 20px; font-size: 14px; }
    .alert-warning { background: rgba(251,191,36,0.1); border: 1px solid rgba(251,191,36,0.3); color: var(--amber); }
    .alert-success { background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.3); color: var(--green); }
    .alert-info { background: rgba(232,255,62,0.08); border: 1px solid rgba(232,255,62,0.2); color: var(--accent); }
    /* TABS */
    .tab-bar { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 28px; }
    .tab-btn { background: none; border: none; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; padding: 10px 16px; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; margin-bottom: -1px; }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    /* DETAIL ROWS */
    .detail-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid var(--border); gap: 16px; }
    .detail-key { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; flex-shrink: 0; }
    .detail-val { font-size: 14px; color: var(--text); text-align: right; }
    /* PROFILE AVATAR */
    .profile-avatar { width: 72px; height: 72px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--black); flex-shrink: 0; }
    /* RENEWAL BANNER */
    .renewal-banner { background: linear-gradient(135deg, rgba(255,107,53,0.15), rgba(232,255,62,0.1)); border: 1px solid rgba(255,107,53,0.4); border-radius: 12px; padding: 18px 22px; margin-bottom: 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    /* GALLERY */
    .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
    .gallery-item { aspect-ratio: 4/3; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; cursor: pointer; }
    .gallery-item:hover { border-color: rgba(232,255,62,0.4); transform: translateY(-2px); }
    /* STEPS */
    .steps { display: flex; align-items: center; gap: 8px; margin-bottom: 32px; flex-wrap: wrap; }
    .step-num { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
    /* TOASTS */
    .toast-container { position: fixed; bottom: 80px; right: 20px; z-index: 300; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
    .toast { background: var(--dark); border: 1px solid var(--border); border-radius: 10px; padding: 13px 16px; max-width: 320px; display: flex; align-items: center; gap: 10px; font-size: 13px; animation: fadeUp 0.3s ease; }
    .toast-success { border-color: rgba(74,222,128,0.5); }

    .demo-btn.active { background: var(--accent); color: var(--black); font-weight: 700; }
    .demo-sep { color: #444; margin: 0 4px; }
    /* ANIMATIONS */
    @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse  { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
    @keyframes spin   { to { transform: rotate(360deg); } }
    .fade-up { animation: fadeUp 0.45s ease both; }
    /* ABOUT */
    .about-hero { min-height: 38vh; display: flex; align-items: center; background: linear-gradient(135deg,#0a0a0a,#1a1a08); padding-top: 64px; }
    /* CONTACT GRID */
    .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
    /* BAR CHART */
    .bar-wrap { display:flex; gap:3px; align-items:flex-end; height:72px; }
    .bar { flex:1; border-radius:2px 2px 0 0; transition:height 0.6s ease; min-height:4px; }
    .bar-label { font-size:9px; color:var(--muted); text-transform:uppercase; text-align:center; margin-top:4px; }
    /* WA BUTTON */
    .btn-wa { background: #25d366 !important; color: white !important; border: none; }
    .btn-wa:hover { background: #1db954 !important; transform: translateY(-1px); }
    /* ADMIN ADD FORM */
    .admin-add-form { background: rgba(232,255,62,0.04); border: 1px solid rgba(232,255,62,0.2); border-radius: 12px; padding: 24px; margin-bottom: 28px; }
    /* EVENT LEVEL BADGES */
    .event-level { padding: 3px 10px; border-radius: 100px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; display: inline-flex; }
    .level-easy { background: rgba(74,222,128,0.15); color: var(--green); border: 1px solid rgba(74,222,128,0.3); }
    .level-moderate { background: rgba(251,191,36,0.15); color: var(--amber); border: 1px solid rgba(251,191,36,0.3); }
    .level-hard { background: rgba(248,113,113,0.15); color: var(--red); border: 1px solid rgba(248,113,113,0.3); }
    /* TAB BAR SCROLL */
    .tab-bar { overflow-x: auto; }
    .tab-btn { white-space: nowrap; }
    /* TRAILS */
    .trail-card { padding:0; overflow:hidden; }
    .trail-map-mini { width:100%; background:#0d1a0d; position:relative; }
    .trail-map-mini .leaflet-container { background:#0d1117; }
    .diff-badge { display:inline-flex; padding:2px 9px; border-radius:100px; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; }
    .diff-easy         { background:rgba(74,222,128,.15); color:var(--green);  border:1px solid rgba(74,222,128,.3); }
    .diff-intermediate { background:rgba(251,191,36,.15); color:var(--amber);  border:1px solid rgba(251,191,36,.3); }
    .diff-hard         { background:rgba(248,113,113,.15); color:var(--red);   border:1px solid rgba(248,113,113,.3); }
    .diff-extreme      { background:rgba(168,85,247,.15); color:#c084fc;       border:1px solid rgba(168,85,247,.3); }
    .trail-stat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(110px,1fr)); gap:10px; }
    .trail-stat { background:var(--dark); border-radius:8px; padding:10px 14px; border:1px solid var(--border); }
    .trail-stat-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; margin-bottom:3px; }
    .trail-stat-val   { font-size:15px; font-weight:600; }
    /* IMPORT FORM */
    .import-bar { display:flex; gap:10px; align-items:stretch; }
    .import-bar input { flex:1; }
    /* RESPONSIVE */
    @media(max-width:768px){
      .nav-links { display:none; }
      .mobile-toggle { display:block; }
      .hero-stats { gap:28px; }
      .form-row { grid-template-columns:1fr; }
      .contact-grid { grid-template-columns:1fr; }
      .dash-grid { grid-template-columns:1fr 1fr !important; }
      .demo-bar { gap:5px; }
    }
    @media(max-width:480px){
      .dash-grid { grid-template-columns:1fr !important; }
      .hero-title { font-size:clamp(52px,14vw,80px); }
    }
  </style>
</head>

}

function Navbar({page,setPage,user,logout}){

  const links=[{k:"home",l:"Home"},{k:"events",l:"Events"},{k:"trails",l:"Trails"},{k:"blog",l:"Blog"},{k:"about",l:"About"},{k:"gallery",l:"Gallery"},{k:"join",l:"Join"},{k:"contact",l:"Contact"}];
  return(
    <>
    <nav className="nav">
      <div className="nav-inner">
        <button className="nav-logo" onClick={()=>go("home")}><I n="bike"/> PCC</button>
        <div className="nav-links">
          {links.map(n=><button key={n.k} className={`nav-link${page===n.k?" active":""}`} onClick={()=>go(n.k)}>{n.l}</button>)}
          {user
            ?<><button className={`nav-link${page==="dashboard"?" active":""}`} onClick={()=>go("dashboard")}>Dashboard</button>
               {user.isAdmin&&<button className={`nav-link${page==="admin"?" active":""}`} onClick={()=>go("admin")}>Admin</button>}
               <button className="nav-link" onClick={logout}>Logout</button></>
            :<><button className={`nav-link${page==="login"?" active":""}`} onClick={()=>go("login")}>Login</button>
               <button className="btn-nav-join" onClick={()=>go("join")}>Join Now</button></>}
        </div>
        <button className="mobile-toggle" onClick={()=>setMob(!mob)}>{mob?"✕":"☰"}</button>
      </div>
    </nav>
    {mob&&<div className="mobile-menu open">
      {links.map(n=><button key={n.k} className="nav-link" onClick={()=>go(n.k)}>{n.l}</button>)}
      {user
        ?<><button className="nav-link" onClick={()=>go("dashboard")}>Dashboard</button>
           {user.isAdmin&&<button className="nav-link" onClick={()=>go("admin")}>Admin</button>}
           <button className="btn btn-ghost" style={{marginTop:8}} onClick={()=>{logout();setMob(false);}}>Logout</button></>
        :<><button className="nav-link" onClick={()=>go("login")}>Login</button>
           <button className="btn btn-primary" style={{marginTop:8}} onClick={()=>go("join")}>Join Now</button></>}
    </div>}
    </>
  );
}

// ── TRAIL MAP (shared by mini-card and detail modal) ───────
function TrailMap({trail, interactive, height}){
  const ref     = useRef(null);
  const mapInst = useRef(null);

  useEffect(()=>{
    if(!ref.current || mapInst.current) return;
    const L = window.L;
    if(!L) return;

    const map = L.map(ref.current, {
      zoomControl:      interactive,
      scrollWheelZoom:  interactive,
      dragging:         interactive,
      touchZoom:        interactive,
      doubleClickZoom:  interactive,
      boxZoom:          interactive,
      keyboard:         interactive,
      attributionControl: false,
    }).setView([trail.lat, trail.lng], 13);
    mapInst.current = map;

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19}).addTo(map);

    if(trail.route && trail.route.length > 1){
      const poly = L.polyline(trail.route, {color:"#e8ff3e", weight: interactive?4:3, opacity:0.9}).addTo(map);
      map.fitBounds(poly.getBounds(), {padding: interactive?[24,24]:[12,12]});

      // Start dot
      const dot = L.divIcon({html:'<div style="background:#4ade80;width:10px;height:10px;border-radius:50%;border:2px solid #111;box-shadow:0 2px 4px rgba(0,0,0,.6)"></div>', className:"", iconSize:[10,10], iconAnchor:[5,5]});
      L.marker(trail.route[0], {icon:dot}).addTo(map);
    }

    if(interactive) L.control.attribution({prefix:false}).addTo(map);
    setTimeout(()=>{ if(mapInst.current) mapInst.current.invalidateSize(); }, 150);

    return ()=>{ if(mapInst.current){ mapInst.current.remove(); mapInst.current=null; } };
  }, [trail.id, interactive]);

  return <div ref={ref} style={{width:"100%", height, background:"#0d1117"}}/>;
}

// ── SIGNUP ─────────────────────────────────────────────────
function SignupPage({setPage,addMember,addToast}){
  const [step,setStep]=useState(1);
  const [form,setForm]=useState({firstName:"",surname:"",email:"",phone:"",password:"",address:"",emergencyName:"",emergencyPhone:"",nokName:"",nokRelationship:"",nokPhone:"",medical:""});
  const [errs,setErrs]=useState({});
  const s=k=>e=>setForm(f=>({...f,[k]:e.target.value}));

  const v1=()=>{
    const e={};
    if(!form.firstName)e.firstName="Required";
    if(!form.surname)e.surname="Required";
    if(!form.email||!/\S+@\S+\.\S+/.test(form.email))e.email="Valid email required";
    if(!form.phone)e.phone="Required";
    if(!form.password||form.password.length<6)e.password="Min 6 characters";
    if(!form.address)e.address="Required";
    setErrs(e);return Object.keys(e).length===0;
  };
  const v2=()=>{
    const e={};
    if(!form.emergencyName)e.emergencyName="Required";
    if(!form.emergencyPhone)e.emergencyPhone="Required";
    if(!form.nokName)e.nokName="Required";
    if(!form.nokRelationship)e.nokRelationship="Required";
    if(!form.nokPhone)e.nokPhone="Required";
    setErrs(e);return Object.keys(e).length===0;
  };
  const submit=()=>{
    if(!v2())return;
    addMember({...form,status:"unpaid",paidYear:null,paymentDate:null,isAdmin:false,password:form.password||"demo123"});
    addToast("Account created! Please log in to continue.","success");
    setPage("login");
  };

  const Err=({k})=>errs[k]?<div style={{color:"var(--red)",fontSize:12,marginTop:4}}>{errs[k]}</div>:null;

  return(
    <div style={{paddingTop:64}}>
      <div style={{maxWidth:660,margin:"0 auto",padding:"60px 24px 120px"}}>
        <div className="section-label">New Member</div>
        <h1 className="section-title">JOIN THE CLUB</h1>
        <p style={{color:"var(--muted)",marginBottom:32}}>Create your account — payment is made from your dashboard after signup.</p>

        {/* STEPS */}
        <div className="steps">
          {[1,2].map((n,i)=>(
            <React.Fragment key={n}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div className="step-num" style={{background:n<step?"var(--green)":n===step?"var(--accent)":"var(--border)",color:"var(--black)"}}>{n<step?"✓":n}</div>
                <span style={{fontSize:13,fontWeight:600,color:n===step?"var(--text)":n<step?"var(--green)":"var(--muted)"}}>{n===1?"Personal Info":"Safety Details"}</span>
              </div>
              {i<1&&<div style={{flex:1,height:1,background:n<step?"var(--green)":"var(--border)",margin:"0 8px",minWidth:20}}/>}
            </React.Fragment>
          ))}
        </div>

        {step===1&&(
          <div className="card fade-up">
            <div className="form-row">
              <div className="form-group"><label className="form-label">First Name *</label><input className="form-input" value={form.firstName} onChange={s("firstName")} placeholder="James"/><Err k="firstName"/></div>
              <div className="form-group"><label className="form-label">Surname *</label><input className="form-input" value={form.surname} onChange={s("surname")} placeholder="Smith"/><Err k="surname"/></div>
            </div>
            <div className="form-group"><label className="form-label">Email Address *</label><input className="form-input" type="email" value={form.email} onChange={s("email")} placeholder="james@example.com"/><Err k="email"/></div>
            <div className="form-row">
              <div className="form-group"><label className="form-label">Phone Number *</label><input className="form-input" value={form.phone} onChange={s("phone")} placeholder="082 123 4567"/><Err k="phone"/></div>
              <div className="form-group"><label className="form-label">Password *</label><input className="form-input" type="password" value={form.password} onChange={s("password")} placeholder="Min 6 characters"/><Err k="password"/></div>
            </div>
            <div className="form-group"><label className="form-label">Address *</label><input className="form-input" value={form.address} onChange={s("address")} placeholder="12 Beach Rd, Plettenberg Bay"/><Err k="address"/></div>
            <button className="btn btn-primary" style={{width:"100%",marginTop:8}} onClick={()=>{if(v1())setStep(2);}}>Continue to Safety Details →</button>
          </div>
        )}
        {step===2&&(
          <div className="card fade-up">
            <div className="alert alert-info"><I n="shield"/><span style={{fontSize:13}}>Safety information is used only in emergencies. All data is kept confidential.</span></div>
            <h3 style={{fontWeight:600,marginBottom:16,fontSize:15}}>Emergency Contact</h3>
            <div className="form-row">
              <div className="form-group"><label className="form-label">Contact Name *</label><input className="form-input" value={form.emergencyName} onChange={s("emergencyName")} placeholder="Sarah Smith"/><Err k="emergencyName"/></div>
              <div className="form-group"><label className="form-label">Contact Phone *</label><input className="form-input" value={form.emergencyPhone} onChange={s("emergencyPhone")} placeholder="083 111 2222"/><Err k="emergencyPhone"/></div>
            </div>
            <h3 style={{fontWeight:600,marginBottom:16,marginTop:8,fontSize:15}}>Next of Kin</h3>
            <div className="form-row">
              <div className="form-group"><label className="form-label">Full Name *</label><input className="form-input" value={form.nokName} onChange={s("nokName")} placeholder="Sarah Smith"/><Err k="nokName"/></div>
              <div className="form-group"><label className="form-label">Relationship *</label><input className="form-input" value={form.nokRelationship} onChange={s("nokRelationship")} placeholder="Spouse / Parent"/><Err k="nokRelationship"/></div>
            </div>
            <div className="form-group"><label className="form-label">Next of Kin Phone *</label><input className="form-input" value={form.nokPhone} onChange={s("nokPhone")} placeholder="083 111 2222"/><Err k="nokPhone"/></div>
            <div className="form-group"><label className="form-label">Medical Information <span style={{color:"var(--muted)"}}>(Optional)</span></label><textarea className="form-input" rows={3} value={form.medical} onChange={s("medical")} placeholder="Allergies, conditions, medication..." style={{resize:"vertical"}}/></div>
            <div style={{display:"flex",gap:12,marginTop:8}}>
              <button className="btn btn-ghost" onClick={()=>setStep(1)}>← Back</button>
              <button className="btn btn-primary" style={{flex:1}} onClick={submit}>Create Account</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function LoginPage({setPage,members,setUser,addToast}){
  const [email,setEmail]=useState("");
  const [pw,setPw]=useState("");
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);

  const login=()=>{
    setLoading(true);
    setTimeout(()=>{
      const m=members.find(x=>x.email===email&&x.password===pw);
      if(m){setUser(m);addToast(`Welcome back, ${m.firstName}!`,"success");setPage("dashboard");}
      else setErr("Invalid email or password. Try a demo account below.");
      setLoading(false);
    },700);
  };

  return(
    <div style={{paddingTop:64,minHeight:"100vh",display:"flex",alignItems:"center"}}>
      <div style={{maxWidth:420,margin:"0 auto",padding:"40px 24px",width:"100%"}}>

          <p style={{color:"var(--muted)",fontSize:14,marginTop:4}}>Sign in to your Plett Cycling Club account</p>
        </div>
        <div className="card">
          {err&&<div className="alert alert-warning"><I n="alert"/><span style={{fontSize:13}}>{err}</span></div>}
          <div className="form-group"><label className="form-label">Email Address</label><input className="form-input" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="your@email.com" onKeyDown={e=>e.key==="Enter"&&login()}/></div>
          <div className="form-group"><label className="form-label">Password</label><input className="form-input" type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="••••••••" onKeyDown={e=>e.key==="Enter"&&login()}/></div>

          <div style={{marginTop:16,padding:12,background:"rgba(255,255,255,0.03)",borderRadius:8}}>
            <div style={{fontSize:12,color:"var(--muted)",marginBottom:8}}>Demo accounts (password: demo123):</div>
            {[["james@example.com","Admin + Paid 2026"],["craig@example.com","Unpaid member"],["tamsin@example.com","Lapsed – paid 2025"]].map(([em,lbl])=>(
              <button key={em} style={{display:"block",width:"100%",textAlign:"left",background:"none",border:"none",color:"var(--accent)",fontSize:12,padding:"3px 0",cursor:"pointer",fontFamily:"DM Mono,monospace"}} onClick={()=>{setEmail(em);setPw("demo123");}}>
                {em} — {lbl}
              </button>
            ))}
          </div>
        </div>
        <p style={{textAlign:"center",marginTop:20,color:"var(--muted)",fontSize:14}}>
          Not a member? <button style={{background:"none",border:"none",color:"var(--accent)",cursor:"pointer",fontFamily:"DM Sans,sans-serif",fontSize:14}} onClick={()=>setPage("join")}>Join now →</button>
        </p>
      </div>
    </div>
  );
}

              <div style={{borderTop:"1px solid var(--border)",paddingTop:12}}>
                <div style={{fontSize:11,color:"var(--muted)",marginBottom:2}}>From: <span style={{color:"var(--text)"}}>noreply@plettcycling.co.za</span></div>
                <div style={{fontSize:11,color:"var(--muted)",marginBottom:10}}>Subject: <span style={{color:"var(--text)",fontWeight:600}}>PCC Membership {year} — Payment Confirmed</span></div>
                <div style={{fontSize:12,fontFamily:"DM Mono,monospace",color:"#ccc",lineHeight:1.75,whiteSpace:"pre-line",background:"var(--dark)",borderRadius:8,padding:"10px 12px"}}>{emailBody}</div>
              </div>
            </div>

            <button className="btn btn-primary" style={{width:"100%"}} onClick={onClose}>Done</button>
          </>
        )}
      </div>
    </div>
  );
}

// ── MEMBER DASHBOARD ────────────────────────────────────────
function MemberDashboard({user,updateMember,addToast,simMonth}){
  const [showPay,setShowPay]=useState(false);
  const [targetYear,setTargetYear]=useState(CURRENT_YEAR);
  const [tab,setTab]=useState("overview");
  const [editMode,setEditMode]=useState(false);
  const [editForm,setEditForm]=useState({...user});

  useEffect(()=>setEditForm({...user}),[user]);

  const paid26 = user.paidYear===CURRENT_YEAR;
  const paid25 = user.paidYear===CURRENT_YEAR-1;
  const isOct  = simMonth>=9;

  const payOpts=[];
  if(!paid26) payOpts.push({year:CURRENT_YEAR, label:CURRENT_YEAR+" Membership (Current Year)"});
  if(paid26)  payOpts.push({year:CURRENT_YEAR+1, label:CURRENT_YEAR+1+" Membership (Next Year"+(isOct?" — Early Bird":"")+")"});

  const handlePaySuccess=yr=>{
    updateMember(user.id,{status:"paid",paidYear:yr,paymentDate:new Date().toISOString().split("T")[0]});
  };

  const saveProfile=()=>{
    updateMember(user.id,editForm);
    setEditMode(false);
    addToast("Profile updated.","success");
  };

  const ef=k=>e=>setEditForm(f=>({...f,[k]:e.target.value}));

  return(
    <div className="dash-layout">
      <div className="dash-content">
        {/* Header */}
        <div style={{display:"flex",alignItems:"center",gap:16,flexWrap:"wrap",marginBottom:32}}>
          <div className="profile-avatar">{user.firstName[0]}{user.surname[0]}</div>
          <div>
            <div style={{fontFamily:"Bebas Neue,sans-serif",fontSize:32}}>{user.firstName} {user.surname}</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:6}}>
              <span className={`badge ${paid26?"badge-paid":"badge-unpaid"}`}>{paid26?"✓ Paid":"✗ Unpaid"}</span>
              {user.isAdmin&&<span className="badge badge-admin"><I n="crown"/> Admin</span>}
            </div>
          </div>
        </div>

        {/* Oct renewal banner */}
        {isOct&&paid26&&(
          <div className="renewal-banner">
            <span style={{fontSize:22}}>🔔</span>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,color:"var(--accent2)",marginBottom:4}}>Next Season Memberships Now Open!</div>
              <div style={{fontSize:13,color:"var(--muted)"}}>Secure your {CURRENT_YEAR+1} membership now for only R{MEMBERSHIP_FEE} — early bird pricing!</div>
            </div>
            <button className="btn btn-primary btn-sm" onClick={()=>{setTargetYear(CURRENT_YEAR+1);setShowPay(true);}}>Renew Now</button>
          </div>
        )}

        {/* Tabs */}
        <div className="tab-bar">
          {[["overview","Overview"],["payments","Payments"],["profile","Profile"]].map(([k,l])=>(
            <button key={k} className={`tab-btn${tab===k?" active":""}`} onClick={()=>setTab(k)}>{l}</button>
          ))}
        </div>

        {tab==="overview"&&(
          <div className="fade-up">
            <div className="dash-grid" style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:16,marginBottom:28}}>
              <div className="metric-card" style={{borderColor:paid26?"rgba(74,222,128,0.3)":"rgba(248,113,113,0.3)"}}>
                <div className="metric-label">Status</div>
                <div className="metric-val" style={{color:paid26?"var(--green)":"var(--red)"}}>{paid26?"ACTIVE":"INACTIVE"}</div>
                <div style={{fontSize:13,color:"var(--muted)"}}>Year {CURRENT_YEAR}</div>
              </div>
              <div className="metric-card">
                <div className="metric-label">Paid Year</div>
                <div className="metric-val" style={{color:"var(--accent)"}}>{user.paidYear||"—"}</div>
                <div style={{fontSize:13,color:"var(--muted)"}}>Valid to 31 Dec {user.paidYear||"—"}</div>
              </div>
              <div className="metric-card">
                <div className="metric-label">Payment Date</div>
                <div style={{fontFamily:"Bebas Neue,sans-serif",fontSize:22,marginTop:8}}>{fmt(user.paymentDate)}</div>
              </div>
            </div>

            {paid26
              ?<div className="alert alert-success"><I n="check"/><div><strong>Your {CURRENT_YEAR} membership is active.</strong><div style={{fontSize:13,marginTop:2}}>Valid 1 Jan {CURRENT_YEAR} – 31 Dec {CURRENT_YEAR}. You're all set to ride!</div></div></div>
              :paid25
                ?<div className="alert alert-warning"><I n="alert"/><div><strong>Your membership has lapsed.</strong><div style={{fontSize:13,marginTop:2}}>You paid for {CURRENT_YEAR-1} but have not renewed for {CURRENT_YEAR}. Please pay to participate in rides.</div></div></div>
                :<div className="alert alert-warning"><I n="alert"/><div><strong>You have not paid the {CURRENT_YEAR} membership.</strong><div style={{fontSize:13,marginTop:2}}>Your account is created but payment is required to join club rides.</div></div></div>
            }

            {payOpts.length>0&&(
              <div>
                <h3 style={{fontWeight:600,marginBottom:16}}>Pay Your Membership</h3>
                <div style={{display:"grid",gap:12}}>
                  {payOpts.map(o=>(
                    <div key={o.year} className="card" style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12,borderColor:o.year===CURRENT_YEAR+1?"rgba(255,107,53,0.4)":"var(--border)"}}>
                      <div>
                        <div style={{fontWeight:600,marginBottom:4}}>{o.label}</div>
                        <div style={{fontSize:13,color:"var(--muted)"}}>R{MEMBERSHIP_FEE} · Valid 1 Jan {o.year} – 31 Dec {o.year}</div>
                      </div>
                      <button className="btn btn-primary btn-sm" onClick={()=>{setTargetYear(o.year);setShowPay(true);}}><I n="credit"/> Pay Now</button>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {!isOct&&paid26&&(
              <div className="alert alert-info" style={{marginTop:20}}>
                <I n="calendar"/>
                <div style={{fontSize:13}}>Next year ({CURRENT_YEAR+1}) renewals open on <strong>1 October {CURRENT_YEAR}</strong>. Use the demo bar below to simulate October.</div>
              </div>
            )}
          </div>
        )}

        {tab==="payments"&&(
          <div className="fade-up">
            <h3 style={{fontWeight:600,marginBottom:20}}>Payment History</h3>
            {user.paymentDate
              ?<div className="card" style={{padding:0}}><div className="table-wrap"><table><thead><tr><th>Date</th><th>Description</th><th>Amount</th><th>Status</th></tr></thead><tbody><tr>
                  <td style={{fontFamily:"DM Mono,monospace",fontSize:13}}>{fmt(user.paymentDate)}</td>
                  <td>Annual Membership — {user.paidYear}</td>
                  <td style={{fontFamily:"DM Mono,monospace"}}>R{MEMBERSHIP_FEE}.00</td>
                  <td><span className="badge badge-paid">Paid</span></td>
                </tr></tbody></table></div></div>
              :<div className="card" style={{textAlign:"center",padding:"48px 24px",color:"var(--muted)"}}>
                <div style={{fontSize:40,marginBottom:12,opacity:0.3}}>💳</div>
                <div>No payment history yet.</div>
                <button className="btn btn-primary btn-sm" style={{marginTop:16}} onClick={()=>setTab("overview")}>Go to Overview →</button>
              </div>
            }
          </div>
        )}

        {tab==="profile"&&(
          <div className="fade-up">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <h3 style={{fontWeight:600}}>Profile Details</h3>
              {!editMode
                ?<button className="btn btn-ghost btn-sm" onClick={()=>setEditMode(true)}>Edit Profile</button>
                :<div style={{display:"flex",gap:8}}>
                   <button className="btn btn-ghost btn-sm" onClick={()=>setEditMode(false)}>Cancel</button>
                   <button className="btn btn-primary btn-sm" onClick={saveProfile}>Save</button>
                 </div>
              }
            </div>
            <div className="card">
              {editMode?(
                <>
                  <div className="form-row">
                    <div className="form-group"><label className="form-label">First Name</label><input className="form-input" value={editForm.firstName} onChange={ef("firstName")}/></div>
                    <div className="form-group"><label className="form-label">Surname</label><input className="form-input" value={editForm.surname} onChange={ef("surname")}/></div>
                  </div>
                  <div className="form-group"><label className="form-label">Phone</label><input className="form-input" value={editForm.phone} onChange={ef("phone")}/></div>
                  <div className="form-group"><label className="form-label">Address</label><input className="form-input" value={editForm.address} onChange={ef("address")}/></div>
                  <div className="form-group"><label className="form-label">Medical Info</label><textarea className="form-input" rows={3} value={editForm.medical} onChange={ef("medical")}/></div>
                </>
              ):(
                [["Full Name",`${user.firstName} ${user.surname}`],["Email",user.email],["Phone",user.phone],["Address",user.address],["Emergency Contact",`${user.emergencyName} — ${user.emergencyPhone}`],["Next of Kin",`${user.nokName} (${user.nokRelationship}) — ${user.nokPhone}`],["Medical Info",user.medical||"None provided"]].map(([k,v])=>(
                  <div key={k} className="detail-row"><span className="detail-key">{k}</span><span className="detail-val">{v}</span></div>
                ))
              )}
            </div>
          </div>
        )}
      </div>
      {showPay&&<PaymentModal onClose={()=>setShowPay(false)} onSuccess={handlePaySuccess} member={user} year={targetYear} addToast={addToast}/>}
    </div>
  );
}

// ── ADMIN DASHBOARD ─────────────────────────────────────────
function AdminDashboard({members,updateMember,addToast,events,addEvent,removeEvent,posts,addPost,removePost,trails,addTrail,removeTrail,user}){
  const [filter,setFilter]=useState("all");
  const [yearF,setYearF]=useState("all");
  const [search,setSearch]=useState("");
  const [sel,setSel]=useState(null);
  const [tab,setTab]=useState("members");

  const emptyEvent={name:"",date:"",distance:"",level:"Moderate",meetTime:"",meetPoint:"",description:"",maxRiders:30,trailId:null};
  const [newEvent,setNewEvent]=useState({...emptyEvent});
  const nef=k=>e=>setNewEvent(f=>({...f,[k]:e.target.value}));

  const submitEvent=()=>{
    if(!newEvent.name||!newEvent.date)return addToast("Name and date are required.","error");
    const saved=newEvent.name;
    addEvent({...newEvent,id:Date.now(),riders:0,maxRiders:parseInt(newEvent.maxRiders)||30});
    addToast("Event \""+saved+"\" added!","success");
    setNewEvent({...emptyEvent});
  };

  const levelClass=l=>`event-level level-${l.toLowerCase()}`;

  // ── TRAIL IMPORT STATE ──
  const [importUrl,setImportUrl]     = useState("");
  const [importStatus,setImportStatus] = useState("idle"); // idle | loading | preview
  const [importPreview,setImportPreview] = useState(null);

  const runImport = ()=>{
    if(!importUrl.trim()) return addToast("Paste a Trailforks or Strava URL first.","error");
    setImportStatus("loading");
    setTimeout(()=>{
      const data = resolveTrailUrl(importUrl);
      setImportPreview(data);
      setImportStatus("preview");
    }, 1600);
  };

  const confirmImport = ()=>{
    addTrail({...importPreview, id:Date.now(), source: importUrl.includes("strava")?"Strava":"Trailforks", sourceUrl:importUrl});
    addToast("Trail \""+importPreview.name+"\" added to library.","success");
    setImportUrl(""); setImportPreview(null); setImportStatus("idle");
  };

  const CATEGORIES = ["Club News","Ride Report","Member Spotlight","General"];
  const emptyPost  = {title:"",category:"Club News",excerpt:"",body:""};
  const [newPost,setNewPost]  = useState({...emptyPost});
  const npf = k => e => setNewPost(f=>({...f,[k]:e.target.value}));

  const submitPost=()=>{
    if(!newPost.title||!newPost.body)return addToast("Title and body are required.","error");
    const saved=newPost.title;
    addPost({...newPost, id:Date.now(), author:(user?user.firstName+" "+user.surname:"Admin"), date:new Date().toISOString().split("T")[0]});
    addToast("\""+saved+"\" published!","success");
    setNewPost({...emptyPost});
  };

  const rows=members.filter(m=>{
    if(filter==="paid"&&m.paidYear!==CURRENT_YEAR)return false;
    if(filter==="unpaid"&&m.paidYear===CURRENT_YEAR)return false;
    if(yearF!=="all"&&String(m.paidYear)!==yearF)return false;
    if(search&&!`${m.firstName} ${m.surname} ${m.email}`.toLowerCase().includes(search.toLowerCase()))return false;
    return true;
  });

  const totalPaid=members.filter(m=>m.paidYear===CURRENT_YEAR).length;
  const totalUnpaid=members.length-totalPaid;

  const exportCSV=()=>{
    const hdr=["Name","Email","Phone","Status","PaidYear","PaymentDate"];
    const data=rows.map(m=>[`${m.firstName} ${m.surname}`,m.email,m.phone,m.paidYear===CURRENT_YEAR?"Paid":"Unpaid",m.paidYear||"",m.paymentDate||""]);
    const csv=[hdr,...data].map(r=>r.join(",")).join("\n");
    const a=document.createElement("a");
    a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
    a.download="pcc-members.csv";a.click();
    addToast("CSV exported.","success");
  };

  return(
    <div className="dash-layout">
      <div className="dash-content">
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12,marginBottom:32}}>
          <div>
            <div style={{fontFamily:"Bebas Neue,sans-serif",fontSize:36}}>ADMIN DASHBOARD</div>
            <div style={{color:"var(--muted)",fontSize:14}}>Plett Cycling Club — {CURRENT_YEAR}</div>
          </div>
          <span className="badge badge-admin"><I n="crown"/> Admin</span>
        </div>

        {/* Metrics */}
        <div className="dash-grid" style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:16,marginBottom:32}}>
          {[{l:"Total Members",v:members.length,c:"var(--text)"},{l:`Paid ${CURRENT_YEAR}`,v:totalPaid,c:"var(--green)"},{l:"Unpaid / Lapsed",v:totalUnpaid,c:"var(--red)"},{l:`Revenue ${CURRENT_YEAR}`,v:`R${(totalPaid*MEMBERSHIP_FEE).toLocaleString()}`,c:"var(--accent)"}].map(m=>(
            <div key={m.l} className="metric-card"><div className="metric-val" style={{color:m.c}}>{m.v}</div><div className="metric-label">{m.l}</div></div>
          ))}
        </div>

        {/* Tabs */}
        <div className="tab-bar">
          {[["members","Members"],["events","Events"],["trails","Trails"],["news","News"],["reminders","Renewal Reminders"],["analytics","Analytics"]].map(([k,l])=>(
            <button key={k} className={`tab-btn${tab===k?" active":""}`} onClick={()=>setTab(k)}>{l}</button>
          ))}
        </div>

        {tab==="members"&&(
          <>
            <div style={{display:"flex",gap:10,marginBottom:20,flexWrap:"wrap",alignItems:"center"}}>
              <input className="form-input" placeholder="Search..." value={search} onChange={e=>setSearch(e.target.value)} style={{maxWidth:240}}/>
              {["all","paid","unpaid"].map(f=><button key={f} className={`btn btn-sm ${filter===f?"btn-primary":"btn-ghost"}`} onClick={()=>setFilter(f)}>{f.charAt(0).toUpperCase()+f.slice(1)}</button>)}
              <select className="form-input" style={{maxWidth:150}} value={yearF} onChange={e=>setYearF(e.target.value)}>
                <option value="all">All Years</option>
                {[CURRENT_YEAR,CURRENT_YEAR-1,CURRENT_YEAR-2].map(y=><option key={y} value={y}>{y}</option>)}
              </select>
              <button className="btn btn-ghost btn-sm" style={{marginLeft:"auto"}} onClick={exportCSV}><I n="download"/> Export CSV</button>
            </div>
            <div className="card" style={{padding:0}}>
              <div className="table-wrap">
                <table>
                  <thead><tr><th>Member</th><th>Phone</th><th>Status</th><th>Paid Year</th><th>Payment Date</th><th>Role</th><th>Actions</th></tr></thead>
                  <tbody>
                    {rows.map(m=>(
                      <tr key={m.id}>
                        <td><div style={{fontWeight:500}}>{m.firstName} {m.surname}</div><div style={{fontSize:12,color:"var(--muted)"}}>{m.email}</div></td>
                        <td style={{fontSize:13,color:"var(--muted)"}}>{m.phone}</td>
                        <td><span className={`badge ${m.paidYear===CURRENT_YEAR?"badge-paid":"badge-unpaid"}`}>{m.paidYear===CURRENT_YEAR?"Paid":"Unpaid"}</span></td>
                        <td style={{fontFamily:"DM Mono,monospace",fontSize:13}}>{m.paidYear||"—"}</td>
                        <td style={{fontFamily:"DM Mono,monospace",fontSize:13}}>{fmt(m.paymentDate)}</td>
                        <td>{m.isAdmin?<span className="badge badge-admin">Admin</span>:<span style={{fontSize:13,color:"var(--muted)"}}>Member</span>}</td>
                        <td>
                          <div style={{display:"flex",gap:6}}>
                            <button className="btn btn-sm btn-ghost" title="View details" onClick={()=>setSel(m)}><I n="eye"/></button>
                            {!m.isAdmin&&<button className="btn btn-sm btn-ghost" title="Promote to Admin" onClick={()=>{updateMember(m.id,{isAdmin:true});addToast(`${m.firstName} promoted to Admin.`,"success");}}><I n="crown"/></button>}
                          </div>
                        </td>
                      </tr>
                    ))}
                    {rows.length===0&&<tr><td colSpan={7} style={{textAlign:"center",color:"var(--muted)",padding:"36px"}}>No members match current filters.</td></tr>}
                  </tbody>
                </table>
              </div>
            </div>
          </>
        )}

        {tab==="events"&&(
          <div className="fade-up">

            {/* ── ADD EVENT FORM (always visible) ── */}
            <div className="admin-add-form">
              <h3 style={{fontWeight:600,fontSize:16,marginBottom:20}}>Add New Event</h3>
              <div className="form-row">
                <div className="form-group">
                  <label className="form-label">Event Name *</label>
                  <input className="form-input" value={newEvent.name} onChange={nef("name")} placeholder="Robberg Peninsula Loop"/>
                </div>
                <div className="form-group">
                  <label className="form-label">Date *</label>
                  <input type="date" className="form-input" value={newEvent.date} onChange={nef("date")}/>
                </div>
              </div>
              <div className="form-row">
                <div className="form-group">
                  <label className="form-label">Distance</label>
                  <input className="form-input" value={newEvent.distance} onChange={nef("distance")} placeholder="42km"/>
                </div>
                <div className="form-group">
                  <label className="form-label">Level</label>
                  <select className="form-input" value={newEvent.level} onChange={nef("level")}>
                    <option>Easy</option><option>Moderate</option><option>Hard</option>
                  </select>
                </div>
              </div>
              <div className="form-row">
                <div className="form-group">
                  <label className="form-label">Meet Time</label>
                  <input className="form-input" value={newEvent.meetTime} onChange={nef("meetTime")} placeholder="6:00 AM"/>
                </div>
                <div className="form-group">
                  <label className="form-label">Max Riders</label>
                  <input type="number" className="form-input" value={newEvent.maxRiders} onChange={nef("maxRiders")} min={1}/>
                </div>
              </div>
              <div className="form-group">
                <label className="form-label">Meet Point</label>
                <input className="form-input" value={newEvent.meetPoint} onChange={nef("meetPoint")} placeholder="Central Beach Parking Lot"/>
              </div>
              <div className="form-group">
                <label className="form-label">Description</label>
                <textarea className="form-input" rows={3} value={newEvent.description} onChange={nef("description")} placeholder="Brief description of the ride..." style={{resize:"vertical"}}/>
              </div>
              <div className="form-group">
                <label className="form-label">Link a Trail <span style={{color:"var(--muted)",textTransform:"none",fontWeight:400}}>(optional — from Trail Library)</span></label>
                <select className="form-input" value={newEvent.trailId||""} onChange={e=>setNewEvent(f=>({...f,trailId:e.target.value?Number(e.target.value):null}))}>
                  <option value="">— No trail linked —</option>
                  {trails.map(t=><option key={t.id} value={t.id}>{t.name} ({t.distance} · {t.difficulty})</option>)}
                </select>
              </div>
              <button className="btn btn-primary" onClick={submitEvent}><I n="plus"/> Add Event</button>
            </div>

            {/* ── EVENTS LIST ── */}
            <h3 style={{fontWeight:600,marginBottom:16}}>All Events ({events.length})</h3>
            {events.length===0
              ? <div className="card" style={{textAlign:"center",padding:"40px",color:"var(--muted)"}}>No events yet. Add one above.</div>
              : <div style={{display:"grid",gap:12}}>
                  {[...events].sort((a,b)=>new Date(a.date)-new Date(b.date)).map(ev=>{
                    const past=new Date(ev.date)<new Date();
                    const waMsg=[
                      "Plett Cycling Club - Upcoming Ride",
                      "",
                      ev.name,
                      "Date: "+fmt(ev.date),
                      "Meet: "+ev.meetPoint,
                      "Time: "+ev.meetTime,
                      "Distance: "+ev.distance+" / "+ev.level,
                      "",
                      ev.description,
                      "",
                      "Spots: "+ev.riders+"/"+ev.maxRiders,
                      "RSVP: plettcycling.co.za"
                    ].join("\n");
                    return(
                      <div key={ev.id} className="card" style={{opacity:past?0.6:1,display:"flex",gap:16,alignItems:"center",flexWrap:"wrap"}}>
                        <div style={{minWidth:56,textAlign:"center",flexShrink:0}}>
                          <div style={{fontFamily:"Bebas Neue,sans-serif",fontSize:28,color:past?"var(--muted)":"var(--accent)",lineHeight:1}}>{new Date(ev.date).getDate()}</div>
                          <div style={{fontSize:10,color:"var(--muted)",textTransform:"uppercase"}}>{MONTHS[new Date(ev.date).getMonth()]}</div>
                          <div style={{fontSize:10,color:"var(--muted)"}}>{new Date(ev.date).getFullYear()}</div>
                        </div>
                        <div style={{flex:1}}>
                          <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",marginBottom:4}}>
                            <span style={{fontWeight:600}}>{ev.name}</span>
                            <span className={levelClass(ev.level)}>{ev.level}</span>
                            {past&&<span style={{fontSize:11,color:"var(--muted)"}}>— past</span>}
                          </div>
                          <div style={{fontSize:12,color:"var(--muted)"}}>{ev.meetPoint} · {ev.meetTime} · {ev.distance} · {ev.riders}/{ev.maxRiders} riders</div>
                          {ev.trailId&&(()=>{const t=trails.find(x=>x.id===ev.trailId); return t?<div style={{fontSize:11,color:"var(--accent)",marginTop:2}}><I n="route"/> Linked trail: {t.name}</div>:null;})()}
                        </div>
                        <div style={{display:"flex",gap:8,flexShrink:0}}>
                          {!past&&<button className="btn btn-sm btn-wa" onClick={()=>window.open(waShareURL(waMsg),"_blank")}><I n="wa"/> Share to Group</button>}
                          <button className="btn btn-sm btn-ghost" title="Remove event" onClick={()=>{removeEvent(ev.id);addToast("Event removed.","success");}}><I n="trash"/></button>
                        </div>
                      </div>
                    );
                  })}
                </div>
            }
          </div>
        )}

        {tab==="trails"&&(
          <div className="fade-up">
            {/* ── URL IMPORT ── */}
            <div className="admin-add-form">
              <h3 style={{fontWeight:600,fontSize:16,marginBottom:6}}>Import Trail from Strava or Trailforks</h3>
              <p style={{fontSize:13,color:"var(--muted)",marginBottom:16}}>Paste a Trailforks or Strava trail URL — we'll pull the route data automatically.</p>

              <div className="import-bar" style={{marginBottom: importStatus==="idle"?0:16}}>
                <input className="form-input" value={importUrl} onChange={e=>setImportUrl(e.target.value)} placeholder="https://www.trailforks.com/trails/puff-adder-133834/" onKeyDown={e=>e.key==="Enter"&&runImport()}/>
                <button className="btn btn-primary" onClick={runImport} disabled={importStatus==="loading"}>
                  {importStatus==="loading" ? "Importing…" : <><I n="link"/> Import</>}
                </button>
              </div>

              {importStatus==="loading"&&(
                <div style={{display:"flex",alignItems:"center",gap:12,padding:"12px 0",color:"var(--muted)",fontSize:13}}>
                  <div style={{width:16,height:16,borderRadius:"50%",border:"2px solid var(--accent)",borderTopColor:"transparent",animation:"spin 0.8s linear infinite"}}/>
                  Fetching trail data…
                </div>
              )}

              {importStatus==="preview"&&importPreview&&(
                <div>
                  <div style={{fontSize:12,color:"var(--green)",fontWeight:600,marginBottom:12}}>Trail found — review before adding:</div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:10,marginBottom:16}}>
                    {[["Name",importPreview.name],["Type",importPreview.type],["Difficulty",importPreview.difficulty],["Distance",importPreview.distance],["Elevation",importPreview.elevation],["Surface",importPreview.surface]].map(([k,v])=>(
                      <div key={k} style={{background:"var(--card)",borderRadius:8,padding:"8px 12px",border:"1px solid var(--border)"}}>
                        <div style={{fontSize:10,color:"var(--muted)",textTransform:"uppercase",letterSpacing:".08em",marginBottom:2}}>{k}</div>
                        <div style={{fontSize:14,fontWeight:500}}>{v}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{height:200,borderRadius:10,overflow:"hidden",marginBottom:16,border:"1px solid var(--border)"}}>
                    <TrailMap trail={importPreview} interactive={false} height={200}/>
                  </div>
                  <div style={{display:"flex",gap:10}}>
                    <button className="btn btn-primary" onClick={confirmImport}><I n="plus"/> Add to Trail Library</button>
                    <button className="btn btn-ghost" onClick={()=>{setImportStatus("idle");setImportPreview(null);}}>Cancel</button>
                  </div>
                </div>
              )}
            </div>

            {/* ── TRAIL LIBRARY ── */}
            <h3 style={{fontWeight:600,marginBottom:16}}>Trail Library ({trails.length})</h3>
            {trails.length===0
              ?<div className="card" style={{textAlign:"center",padding:"40px",color:"var(--muted)"}}>No trails yet. Import one above.</div>
              :<div style={{display:"grid",gap:12}}>
                {trails.map(t=>(
                  <div key={t.id} className="card" style={{display:"flex",gap:16,alignItems:"flex-start",flexWrap:"wrap"}}>
                    <div style={{width:120,height:80,borderRadius:8,overflow:"hidden",flexShrink:0,border:"1px solid var(--border)"}}>
                      <TrailMap trail={t} interactive={false} height={80}/>
                    </div>
                    <div style={{flex:1,minWidth:180}}>
                      <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",marginBottom:4}}>
                        <span style={{fontWeight:600}}>{t.name}</span>
                        <span className={"diff-badge diff-"+t.difficulty.toLowerCase()}>{t.difficulty}</span>
                      </div>
                      <div style={{fontSize:12,color:"var(--muted)",marginBottom:2}}>{t.type} · {t.distance} · {t.elevation} · {t.source}</div>
                      {t.sourceUrl&&<a href={t.sourceUrl} target="_blank" rel="noreferrer" style={{fontSize:11,color:"var(--accent)",textDecoration:"none"}}><I n="link"/> {t.sourceUrl.slice(0,50)}…</a>}
                    </div>
                    <button className="btn btn-sm btn-ghost" style={{flexShrink:0}} onClick={()=>{removeTrail(t.id);addToast("Trail removed.","success");}}><I n="trash"/> Remove</button>
                  </div>
                ))}
              </div>
            }
          </div>
        )}

        {tab==="news"&&(
          <div className="fade-up">

            {/* ── ADD POST FORM (always visible) ── */}
            <div className="admin-add-form">
              <h3 style={{fontWeight:600,fontSize:16,marginBottom:20}}>Publish New Post</h3>
              <div className="form-row">
                <div className="form-group">
                  <label className="form-label">Title *</label>
                  <input className="form-input" value={newPost.title} onChange={npf("title")} placeholder="Ride report, club update..."/>
                </div>
                <div className="form-group">
                  <label className="form-label">Category</label>
                  <select className="form-input" value={newPost.category} onChange={npf("category")}>
                    {CATEGORIES.map(c=><option key={c}>{c}</option>)}
                  </select>
                </div>
              </div>
              <div className="form-group">
                <label className="form-label">Excerpt <span style={{color:"var(--muted)",textTransform:"none",fontWeight:400}}>(short summary shown on cards)</span></label>
                <input className="form-input" value={newPost.excerpt} onChange={npf("excerpt")} placeholder="One or two sentences summarising the post..."/>
              </div>
              <div className="form-group">
                <label className="form-label">Body *</label>
                <textarea className="form-input" rows={6} value={newPost.body} onChange={npf("body")} placeholder="Full post content. Use blank lines to separate paragraphs." style={{resize:"vertical"}}/>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
                <button className="btn btn-primary" onClick={submitPost}><I n="plus"/> Publish Post</button>
                <span style={{fontSize:12,color:"var(--muted)"}}>Will appear immediately on the public Blog page</span>
              </div>
            </div>

            {/* ── POST LIST ── */}
            <h3 style={{fontWeight:600,marginBottom:16}}>Published Posts ({posts.length})</h3>
            {posts.length===0
              ? <div className="card" style={{textAlign:"center",padding:"40px",color:"var(--muted)"}}>No posts yet. Write one above.</div>
              : <div style={{display:"grid",gap:12}}>
                  {[...posts].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(p=>(
                    <div key={p.id} className="card" style={{display:"flex",gap:16,alignItems:"flex-start",flexWrap:"wrap"}}>
                      <div style={{flex:1,minWidth:200}}>
                        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",marginBottom:6}}>
                          <span style={{fontWeight:600,fontSize:14}}>{p.title}</span>
                          <span style={{fontSize:11,padding:"2px 8px",borderRadius:100,background:"rgba(232,255,62,0.08)",color:"var(--accent)",border:"1px solid rgba(232,255,62,0.2)"}}>{p.category}</span>
                        </div>
                        <div style={{fontSize:12,color:"var(--muted)"}}>{p.author} · {fmt(p.date)}</div>
                        {p.excerpt&&<div style={{fontSize:13,color:"var(--muted)",marginTop:4,lineHeight:1.5}}>{p.excerpt}</div>}
                      </div>
                      <button className="btn btn-sm btn-ghost" style={{flexShrink:0}} title="Delete post" onClick={()=>{removePost(p.id);addToast("Post deleted.","success");}}><I n="trash"/> Delete</button>
                    </div>
                  ))}
                </div>
            }
          </div>
        )}

        {tab==="reminders"&&(
          <div className="fade-up">
            <div className="alert alert-info"><I n="bell"/><div><strong>Renewal Reminder System</strong><div style={{fontSize:13,marginTop:4}}>Shows how automated reminders are triggered. In production, emails are sent at scheduled dates.</div></div></div>
            <h3 style={{fontWeight:600,marginBottom:16}}>Reminder Schedule</h3>
            <div style={{display:"grid",gap:12,marginBottom:32}}>
              {[
                {t:"1 October",ev:"Next year memberships open",tg:"All paid current-year members",msg:`"Plett Cycling Club ${CURRENT_YEAR+1} memberships are now open! Renew early and secure your spot."`},
                {t:"1 November",ev:"First renewal reminder",tg:"Members not yet renewed for next year",msg:`"Reminder: ${CURRENT_YEAR+1} memberships are open. Renew now for uninterrupted access."`},
                {t:"1 December",ev:"Final renewal push",tg:"Members not yet renewed for next year",msg:`"Last chance! ${CURRENT_YEAR+1} renewal closes 31 Dec. Don't lose your spot."`},
                {t:"31 January",ev:"Lapse notice",tg:"Members who haven't renewed",msg:`"Your ${CURRENT_YEAR} membership has lapsed. Pay now to rejoin club rides."`},
              ].map(r=>(
                <div key={r.t} className="card">
                  <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
                    <div style={{background:"rgba(232,255,62,0.1)",border:"1px solid rgba(232,255,62,0.2)",borderRadius:8,padding:"5px 12px",fontSize:12,fontFamily:"DM Mono,monospace",color:"var(--accent)",whiteSpace:"nowrap",alignSelf:"flex-start"}}>{r.t}</div>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:600,marginBottom:4}}>{r.ev}</div>
                      <div style={{fontSize:13,color:"var(--muted)",marginBottom:8}}>Target: {r.tg}</div>
                      <div style={{fontSize:13,background:"var(--dark)",borderRadius:6,padding:"8px 12px",borderLeft:"3px solid var(--accent2)",color:"#ccc",fontStyle:"italic"}}>{r.msg}</div>
                    </div>
                  </div>
                </div>
              ))}
            </div>
            <h3 style={{fontWeight:600,marginBottom:16}}>Members Needing Reminder ({CURRENT_YEAR})</h3>
            <div className="card" style={{padding:0}}>
              <div className="table-wrap">
                <table>
                  <thead><tr><th>Member</th><th>Email</th><th>Last Paid</th><th>Action</th></tr></thead>
                  <tbody>
                    {members.filter(m=>m.paidYear!==CURRENT_YEAR).map(m=>(
                      <tr key={m.id}>
                        <td>{m.firstName} {m.surname}</td>
                        <td style={{fontSize:13,color:"var(--muted)"}}>{m.email}</td>
                        <td style={{fontFamily:"DM Mono,monospace",fontSize:13}}>{m.paidYear||"Never"}</td>
                        <td><button className="btn btn-sm btn-ghost" onClick={()=>addToast(`📧 Reminder sent to ${m.firstName} ${m.surname}`,"success")}><I n="bell"/> Send Reminder</button></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        )}

        {tab==="analytics"&&(
          <div className="fade-up">
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:24}}>
              <div className="card">
                <h3 style={{fontWeight:600,marginBottom:20}}>Membership Distribution</h3>
                {[{l:`Paid ${CURRENT_YEAR}`,n:totalPaid,c:"var(--green)"},{l:`Unpaid ${CURRENT_YEAR}`,n:totalUnpaid,c:"var(--red)"}].map(x=>(
                  <div key={x.l} style={{marginBottom:16}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:6,fontSize:13}}>
                      <span style={{color:"var(--muted)"}}>{x.l}</span>
                      <span style={{fontFamily:"DM Mono,monospace"}}>{x.n} / {members.length}</span>
                    </div>
                    <div style={{height:8,background:"var(--dark)",borderRadius:4,overflow:"hidden"}}>
                      <div style={{height:"100%",width:`${(x.n/members.length)*100}%`,background:x.c,borderRadius:4}}/>
                    </div>
                  </div>
                ))}
              </div>
              <div className="card">
                <h3 style={{fontWeight:600,marginBottom:20}}>Revenue Summary</h3>
                {[["Collected",`R${(totalPaid*MEMBERSHIP_FEE).toLocaleString()}`],["Outstanding",`R${(totalUnpaid*MEMBERSHIP_FEE).toLocaleString()}`],["Total Potential",`R${(members.length*MEMBERSHIP_FEE).toLocaleString()}`],["Collection Rate",`${Math.round((totalPaid/members.length)*100)}%`]].map(([k,v])=>(
                  <div key={k} className="detail-row"><span className="detail-key">{k}</span><span style={{fontFamily:"DM Mono,monospace",fontSize:16,color:"var(--accent)"}}>{v}</span></div>
                ))}
              </div>
            </div>
            <div className="card" style={{marginTop:24}}>
              <h3 style={{fontWeight:600,marginBottom:20}}>Payment Timeline — {CURRENT_YEAR}</h3>
              <div className="bar-wrap">
                {MONTHS.map((m,i)=>{
                  const cnt=members.filter(mem=>{
                    if(!mem.paymentDate)return false;
                    const d=new Date(mem.paymentDate);
                    return d.getFullYear()===CURRENT_YEAR&&d.getMonth()===i;
                  }).length;
                  const h=cnt>0?Math.max((cnt/members.length)*100,14):4;
                  return(
                    <div key={m} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center"}}>
                      <div className="bar" style={{width:"100%",height:`${h}%`,background:cnt>0?"var(--accent)":"var(--border)"}}/>
                      <div className="bar-label">{m}</div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        )}
      </div>

      {/* Member Detail Modal */}
      {sel&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setSel(null)}>
          <div className="modal" style={{maxWidth:500}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
              <div>
                <div className="modal-title">{sel.firstName.toUpperCase()} {sel.surname.toUpperCase()}</div>
                <div style={{display:"flex",gap:8,marginTop:6}}>
                  <span className={`badge ${sel.paidYear===CURRENT_YEAR?"badge-paid":"badge-unpaid"}`}>{sel.paidYear===CURRENT_YEAR?"Paid":"Unpaid"}</span>
                  {sel.isAdmin&&<span className="badge badge-admin">Admin</span>}
                </div>
              </div>
              <button className="btn btn-ghost btn-sm" onClick={()=>setSel(null)}><I n="x"/></button>
            </div>
            {[["Email",sel.email],["Phone",sel.phone],["Address",sel.address],["Emergency Contact",`${sel.emergencyName} — ${sel.emergencyPhone}`],["Next of Kin",`${sel.nokName} (${sel.nokRelationship})`],["NOK Phone",sel.nokPhone],["Medical Info",sel.medical||"None"],["Paid Year",sel.paidYear||"Not paid"],["Payment Date",fmt(sel.paymentDate)]].map(([k,v])=>(
              <div key={k} className="detail-row"><span className="detail-key">{k}</span><span className="detail-val">{v}</span></div>
            ))}
            {!sel.isAdmin&&<button className="btn btn-ghost btn-sm" style={{marginTop:16,width:"100%"}} onClick={()=>{updateMember(sel.id,{isAdmin:true});addToast(`${sel.firstName} promoted to Admin.`,"success");setSel(null);}}><I n="crown"/> Promote to Admin</button>}
          </div>
        </div>
      )}
    </div>
  );
}

// ── ROOT APP ────────────────────────────────────────────────
function App(){
  const [page,setPage]     = useState("home");
  const [user,setUser]     = useState(null);
  const [members,setMembers] = useState(DUMMY_MEMBERS);
  const [events,setEvents] = useState(INIT_EVENTS);
  const [trails,setTrails] = useState(INIT_TRAILS);
  const [posts,setPosts]   = useState(INIT_POSTS);
  const [selectedTrail, setSelectedTrail] = useState(null);
  const [toasts,setToasts] = useState([]);
  const [simMonth,setSimMonth] = useState(new Date().getMonth());

  const addEvent    = ev  => setEvents(es=>[...es,ev]);
  const removeEvent = id  => setEvents(es=>es.filter(e=>e.id!==id));
  const addTrail    = t   => setTrails(ts=>[...ts,t]);
  const removeTrail = id  => setTrails(ts=>ts.filter(t=>t.id!==id));
  const addPost     = p   => setPosts(ps=>[...ps,p]);
  const removePost  = id  => setPosts(ps=>ps.filter(p=>p.id!==id));

  const addToast=(msg,type="info")=>{
    const id=Date.now();
    setToasts(t=>[...t,{id,message:msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),4000);
  };

  const logout=()=>{setUser(null);setPage("home");addToast("Logged out.","info");};

  const addMember=data=>{
    const m={...data,id:Date.now()};
    setMembers(ms=>[...ms,m]);
  };

  const updateMember=(id,updates)=>{
    setMembers(ms=>ms.map(m=>{
      if(m.id!==id)return m;
      const u={...m,...updates};
      if(user&&user.id===id)setUser(u);
      return u;
    }));
  };

  // Guard routes
  useEffect(()=>{
    if(!user&&(page==="dashboard"||page==="admin"))setPage("login");
    if(user&&page==="admin"&&!user.isAdmin)setPage("dashboard");
  },[page,user]);

  const sp={setPage,addToast};

  return(
    <>
      <Navbar page={page} setPage={setPage} user={user} logout={logout}/>
      <main style={{paddingBottom:72}}>
        {page==="home"    && <HomePage {...sp} events={events} posts={posts}/>}
        {page==="events"  && <EventsPage events={events} setPage={setPage} trails={trails}/>}
        {page==="trails"  && <TrailsPage trails={trails} addToast={addToast} setPage={setPage} setSelectedTrail={setSelectedTrail}/>}
        {page==="trail"   && selectedTrail && <TrailDetailPage trail={selectedTrail} setPage={setPage} addToast={addToast}/>}
        {page==="blog"    && <BlogPage posts={posts} setPage={setPage}/>}
        {page==="about"   && <AboutPage/>}
        {page==="gallery" && <GalleryPage/>}
        {page==="join"    && <SignupPage {...sp} addMember={addMember}/>}
        {page==="contact" && <ContactPage {...sp}/>}
        {page==="login"   && <LoginPage {...sp} members={members} setUser={setUser}/>}
        {page==="dashboard"&&user&&<MemberDashboard user={user} updateMember={updateMember} addToast={addToast} simMonth={simMonth}/>}
        {page==="admin"   &&user?.isAdmin&&<AdminDashboard members={members} updateMember={updateMember} addToast={addToast} events={events} addEvent={addEvent} removeEvent={removeEvent} trails={trails} addTrail={addTrail} removeTrail={removeTrail} posts={posts} addPost={addPost} removePost={removePost} user={user}/>}
      </main>
      <DemoBar simMonth={simMonth} setSimMonth={setSimMonth} setPage={setPage} setUser={setUser} members={members}/>
      <Toasts toasts={toasts}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
