<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #0a0a0a; --dark: #111111; --card: #1a1a1a; --border: #2a2a2a;
      --accent: #e8ff3e; --accent2: #ff6b35; --text: #f0f0f0; --muted: #888;
      --green: #4ade80; --red: #f87171; --amber: #fbbf24; --radius: 12px;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--black); color: var(--text); line-height: 1.6; overflow-x: hidden; }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: var(--dark); } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .font-display { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.04em; }
    .font-mono { font-family: 'DM Mono', monospace; }
    /* NAV */
    .nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(10,10,10,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
    .nav-inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; height: 64px; display: flex; align-items: center; justify-content: space-between; }
    .nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 0.08em; color: var(--accent); cursor: pointer; display: flex; align-items: center; gap: 8px; background: none; border: none; }
    .nav-links { display: flex; align-items: center; gap: 6px; }
    .nav-link { background: none; border: none; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; padding: 8px 12px; border-radius: 8px; transition: all 0.2s; }
    .nav-link:hover { color: var(--text); background: rgba(255,255,255,0.05); }
    .nav-link.active { color: var(--accent); }
    .btn-nav-join { background: var(--accent); color: var(--black); border: none; padding: 8px 18px; border-radius: 8px; font-weight: 700; font-size: 14px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
    .btn-nav-join:hover { opacity: 0.85; transform: translateY(-1px); }
    .mobile-toggle { display: none; background: none; border: none; color: var(--text); cursor: pointer; font-size: 22px; padding: 6px; }
    .mobile-menu { display: none; position: fixed; inset: 0; z-index: 99; background: var(--dark); padding: 80px 24px 24px; flex-direction: column; gap: 8px; overflow-y: auto; }
    .mobile-menu.open { display: flex; }
    .mobile-menu .nav-link { font-size: 18px; padding: 14px 16px; }
    /* BUTTONS */
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 24px; border-radius: 10px; font-weight: 600; font-size: 15px; cursor: pointer; transition: all 0.2s; border: none; font-family: 'DM Sans', sans-serif; }
    .btn-primary { background: var(--accent); color: var(--black); }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(232,255,62,0.3); }
    .btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
    .btn-sm { padding: 7px 14px; font-size: 13px; border-radius: 8px; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
    /* LAYOUT */
    .section { max-width: 1200px; margin: 0 auto; padding: 80px 24px; }
    .section-label { font-size: 12px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; }
    .section-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(36px, 5vw, 60px); line-height: 1; margin-bottom: 16px; }
    /* CARDS */
    .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; }
    .card-hover { transition: all 0.2s; cursor: pointer; }
    .card-hover:hover { border-color: rgba(232,255,62,0.3); transform: translateY(-2px); }
    /* HERO */
    .hero { min-height: 100vh; background: linear-gradient(160deg, #0a0a0a 0%, #1a1208 50%, #0a0a0a 100%); display: flex; align-items: center; padding-top: 64px; position: relative; overflow: hidden; }
    .hero-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(232,255,62,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(232,255,62,0.03) 1px, transparent 1px); background-size: 60px 60px; pointer-events: none; }
    .hero-glow { position: absolute; width: 600px; height: 600px; border-radius: 50%; background: radial-gradient(circle, rgba(232,255,62,0.08) 0%, transparent 70%); top: 20%; right: -10%; pointer-events: none; }
    .hero-emoji { position: absolute; right: 5%; top: 50%; transform: translateY(-50%); opacity: 0.04; font-size: 300px; line-height: 1; pointer-events: none; user-select: none; }
    .hero-content { max-width: 1200px; margin: 0 auto; padding: 80px 24px; position: relative; z-index: 1; }
    .hero-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(232,255,62,0.1); border: 1px solid rgba(232,255,62,0.3); color: var(--accent); padding: 6px 14px; border-radius: 100px; font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 24px; }
    .hero-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(64px, 10vw, 120px); line-height: 0.9; letter-spacing: 0.02em; margin-bottom: 24px; }
    .hero-title span { color: var(--accent); }
    .hero-subtitle { font-size: 18px; color: var(--muted); max-width: 500px; margin-bottom: 40px; line-height: 1.7; }
    .hero-actions { display: flex; gap: 16px; flex-wrap: wrap; }
    .hero-stats { display: flex; gap: 48px; margin-top: 80px; padding-top: 48px; border-top: 1px solid var(--border); flex-wrap: wrap; }
    .stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 48px; color: var(--accent); line-height: 1; }
    .stat-label { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    /* FORMS */
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em; }
    .form-input { width: 100%; background: var(--dark); border: 1px solid var(--border); border-radius: 8px; padding: 11px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; transition: all 0.2s; outline: none; }
    .form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(232,255,62,0.1); }
    .form-input::placeholder { color: #555; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    /* BADGES */
    .badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 100px; font-size: 11px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }
    .badge-paid { background: rgba(74,222,128,0.15); color: var(--green); border: 1px solid rgba(74,222,128,0.3); }
    .badge-unpaid { background: rgba(248,113,113,0.15); color: var(--red); border: 1px solid rgba(248,113,113,0.3); }
    .badge-admin { background: rgba(232,255,62,0.15); color: var(--accent); border: 1px solid rgba(232,255,62,0.3); }
    /* TABLE */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 12px 16px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); border-bottom: 1px solid var(--border); }
    td { padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 14px; }
    tr:hover td { background: rgba(255,255,255,0.02); }
    /* DASHBOARD */
    .dash-layout { min-height: 100vh; padding-top: 64px; }
    .dash-content { max-width: 1100px; margin: 0 auto; padding: 40px 24px; }
    .metric-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 24px; }
    .metric-val { font-family: 'Bebas Neue', sans-serif; font-size: 40px; line-height: 1; }
    .metric-label { font-size: 13px; color: var(--muted); margin-top: 4px; }
    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .modal { background: var(--dark); border: 1px solid var(--border); border-radius: 16px; padding: 32px; max-width: 480px; width: 100%; max-height: 90vh; overflow-y: auto; }
    .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 32px; margin-bottom: 8px; }
    /* PAYSTACK MOCK */
    .paystack-card { background: #0052cc; color: white; border-radius: 12px; padding: 24px; margin: 20px 0; }
    /* ALERTS */
    .alert { padding: 14px 18px; border-radius: 10px; display: flex; gap: 12px; align-items: flex-start; margin-bottom: 20px; font-size: 14px; }
    .alert-warning { background: rgba(251,191,36,0.1); border: 1px solid rgba(251,191,36,0.3); color: var(--amber); }
    .alert-success { background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.3); color: var(--green); }
    .alert-info { background: rgba(232,255,62,0.08); border: 1px solid rgba(232,255,62,0.2); color: var(--accent); }
    /* TABS */
    .tab-bar { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 28px; }
    .tab-btn { background: none; border: none; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; padding: 10px 16px; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; margin-bottom: -1px; }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    /* DETAIL ROWS */

    .detail-key { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; flex-shrink: 0; }
    .detail-val { font-size: 14px; color: var(--text); text-align: right; }
    /* PROFILE AVATAR */

    /* RENEWAL BANNER */

    /* GALLERY */
    .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
    .gallery-item { aspect-ratio: 4/3; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; cursor: pointer; }
    .gallery-item:hover { border-color: rgba(232,255,62,0.4); transform: translateY(-2px); }
    /* STEPS */
    .steps { display: flex; align-items: center; gap: 8px; margin-bottom: 32px; flex-wrap: wrap; }
    .step-num { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
    /* TOASTS */
    .toast-container { position: fixed; bottom: 80px; right: 20px; z-index: 300; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
    .toast { background: var(--dark); border: 1px solid var(--border); border-radius: 10px; padding: 13px 16px; max-width: 320px; display: flex; align-items: center; gap: 10px; font-size: 13px; animation: fadeUp 0.3s ease; }
    .toast-success { border-color: rgba(74,222,128,0.5); }
    .toast-error { border-color: rgba(248,113,113,0.5); }
    /* DEMO BAR */
    .demo-bar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 150; background: rgba(15,8,0,0.97); border-top: 1px solid rgba(232,255,62,0.25); padding: 8px 16px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; font-size: 12px; }
    .demo-label { color: var(--accent); font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; white-space: nowrap; }
    .demo-btn { background: rgba(232,255,62,0.08); border: 1px solid rgba(232,255,62,0.25); color: var(--accent); padding: 4px 10px; border-radius: 5px; font-size: 11px; cursor: pointer; font-family: 'DM Mono', monospace; transition: all 0.15s; white-space: nowrap; }
    .demo-btn:hover { background: rgba(232,255,62,0.18); }
    .demo-btn.active { background: var(--accent); color: var(--black); font-weight: 700; }
    .demo-sep { color: #444; margin: 0 4px; }
    /* ANIMATIONS */
    @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
    .fade-up { animation: fadeUp 0.45s ease both; }
    /* ABOUT */
    .about-hero { min-height: 38vh; display: flex; align-items: center; background: linear-gradient(135deg,#0a0a0a,#1a1a08); padding-top: 64px; }
    /* CONTACT GRID */
    .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
    /* BAR CHART */
    .bar-wrap { display:flex; gap:3px; align-items:flex-end; height:72px; }
    .bar { flex:1; border-radius:2px 2px 0 0; transition:height 0.6s ease; min-height:4px; }
    .bar-label { font-size:9px; color:var(--muted); text-transform:uppercase; text-align:center; margin-top:4px; }
    /* RESPONSIVE */
    @media(max-width:768px){
      .nav-links { display:none; }
      .mobile-toggle { display:block; }
      .hero-stats { gap:28px; }
      .form-row { grid-template-columns:1fr; }
      .contact-grid { grid-template-columns:1fr; }
      .dash-grid { grid-template-columns:1fr 1fr !important; }
      .demo-bar { gap:5px; }
    }
    @media(max-width:480px){
      .dash-grid { grid-template-columns:1fr !important; }
      .hero-title { font-size:clamp(52px,14vw,80px); }
    }
  </style>
</head>

// ── SIGNUP ─────────────────────────────────────────────────
function SignupPage({setPage,addMember,addToast}){
  const [step,setStep]=useState(1);
  const [form,setForm]=useState({firstName:"",surname:"",email:"",phone:"",password:"",address:"",emergencyName:"",emergencyPhone:"",nokName:"",nokRelationship:"",nokPhone:"",medical:""});
  const [errs,setErrs]=useState({});
  const s=k=>e=>setForm(f=>({...f,[k]:e.target.value}));

  const v1=()=>{
    const e={};
    if(!form.firstName)e.firstName="Required";
    if(!form.surname)e.surname="Required";
    if(!form.email||!/\S+@\S+\.\S+/.test(form.email))e.email="Valid email required";
    if(!form.phone)e.phone="Required";
    if(!form.password||form.password.length<6)e.password="Min 6 characters";
    if(!form.address)e.address="Required";
    setErrs(e);return Object.keys(e).length===0;
  };
  const v2=()=>{
    const e={};
    if(!form.emergencyName)e.emergencyName="Required";
    if(!form.emergencyPhone)e.emergencyPhone="Required";
    if(!form.nokName)e.nokName="Required";
    if(!form.nokRelationship)e.nokRelationship="Required";
    if(!form.nokPhone)e.nokPhone="Required";
    setErrs(e);return Object.keys(e).length===0;
  };
  const submit=()=>{
    if(!v2())return;
    addMember({...form,status:"unpaid",paidYear:null,paymentDate:null,isAdmin:false,password:form.password||"demo123"});
    addToast("Account created! Please log in to continue.","success");
    setPage("login");
  };

  const Err=({k})=>errs[k]?<div style={{color:"var(--red)",fontSize:12,marginTop:4}}>{errs[k]}</div>:null;

  return(
    <div style={{paddingTop:64}}>
      <div style={{maxWidth:660,margin:"0 auto",padding:"60px 24px 120px"}}>
        <div className="section-label">New Member</div>
        <h1 className="section-title">JOIN THE CLUB</h1>
        <p style={{color:"var(--muted)",marginBottom:32}}>Create your account — payment is made from your dashboard after signup.</p>

        {/* STEPS */}
        <div className="steps">
          {[1,2].map((n,i)=>(
            <React.Fragment key={n}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div className="step-num" style={{background:n<step?"var(--green)":n===step?"var(--accent)":"var(--border)",color:"var(--black)"}}>{n<step?"✓":n}</div>
                <span style={{fontSize:13,fontWeight:600,color:n===step?"var(--text)":n<step?"var(--green)":"var(--muted)"}}>{n===1?"Personal Info":"Safety Details"}</span>
              </div>
              {i<1&&<div style={{flex:1,height:1,background:n<step?"var(--green)":"var(--border)",margin:"0 8px",minWidth:20}}/>}
            </React.Fragment>
          ))}
        </div>

        {step===1&&(
          <div className="card fade-up">
            <div className="form-row">
              <div className="form-group"><label className="form-label">First Name *</label><input className="form-input" value={form.firstName} onChange={s("firstName")} placeholder="James"/><Err k="firstName"/></div>
              <div className="form-group"><label className="form-label">Surname *</label><input className="form-input" value={form.surname} onChange={s("surname")} placeholder="Smith"/><Err k="surname"/></div>
            </div>
            <div className="form-group"><label className="form-label">Email Address *</label><input className="form-input" type="email" value={form.email} onChange={s("email")} placeholder="james@example.com"/><Err k="email"/></div>
            <div className="form-row">
              <div className="form-group"><label className="form-label">Phone Number *</label><input className="form-input" value={form.phone} onChange={s("phone")} placeholder="082 123 4567"/><Err k="phone"/></div>
              <div className="form-group"><label className="form-label">Password *</label><input className="form-input" type="password" value={form.password} onChange={s("password")} placeholder="Min 6 characters"/><Err k="password"/></div>
            </div>
            <div className="form-group"><label className="form-label">Address *</label><input className="form-input" value={form.address} onChange={s("address")} placeholder="12 Beach Rd, Plettenberg Bay"/><Err k="address"/></div>
            <button className="btn btn-primary" style={{width:"100%",marginTop:8}} onClick={()=>{if(v1())setStep(2);}}>Continue to Safety Details →</button>
          </div>
        )}
        {step===2&&(
          <div className="card fade-up">
            <div className="alert alert-info"><I n="shield"/><span style={{fontSize:13}}>Safety information is used only in emergencies. All data is kept confidential.</span></div>
            <h3 style={{fontWeight:600,marginBottom:16,fontSize:15}}>Emergency Contact</h3>
            <div className="form-row">
              <div className="form-group"><label className="form-label">Contact Name *</label><input className="form-input" value={form.emergencyName} onChange={s("emergencyName")} placeholder="Sarah Smith"/><Err k="emergencyName"/></div>
              <div className="form-group"><label className="form-label">Contact Phone *</label><input className="form-input" value={form.emergencyPhone} onChange={s("emergencyPhone")} placeholder="083 111 2222"/><Err k="emergencyPhone"/></div>
            </div>
            <h3 style={{fontWeight:600,marginBottom:16,marginTop:8,fontSize:15}}>Next of Kin</h3>
            <div className="form-row">
              <div className="form-group"><label className="form-label">Full Name *</label><input className="form-input" value={form.nokName} onChange={s("nokName")} placeholder="Sarah Smith"/><Err k="nokName"/></div>
              <div className="form-group"><label className="form-label">Relationship *</label><input className="form-input" value={form.nokRelationship} onChange={s("nokRelationship")} placeholder="Spouse / Parent"/><Err k="nokRelationship"/></div>
            </div>
            <div className="form-group"><label className="form-label">Next of Kin Phone *</label><input className="form-input" value={form.nokPhone} onChange={s("nokPhone")} placeholder="083 111 2222"/><Err k="nokPhone"/></div>

          <div className="form-group"><label className="form-label">Password</label><input className="form-input" type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="••••••••" onKeyDown={e=>e.key==="Enter"&&login()}/></div>
          <button className="btn btn-primary" style={{width:"100%",marginTop:8}} onClick={login} disabled={loading}>{loading?"Signing in...":"Sign In →"}</button>

            {[["james@example.com","Admin + Paid 2026"],["craig@example.com","Unpaid member"],["tamsin@example.com","Lapsed – paid 2025"]].map(([em,lbl])=>(
              <button key={em} style={{display:"block",width:"100%",textAlign:"left",background:"none",border:"none",color:"var(--accent)",fontSize:12,padding:"3px 0",cursor:"pointer",fontFamily:"DM Mono,monospace"}} onClick={()=>{setEmail(em);setPw("demo123");}}>
                {em} — {lbl}
              </button>
            ))}
          </div>
        </div>
        <p style={{textAlign:"center",marginTop:20,color:"var(--muted)",fontSize:14}}>
          Not a member? <button style={{background:"none",border:"none",color:"var(--accent)",cursor:"pointer",fontFamily:"DM Sans,sans-serif",fontSize:14}} onClick={()=>setPage("join")}>Join now →</button>
        </p>
      </div>
    </div>
  );
}

// ── PAYMENT MODAL ──────────────────────────────────────────
function PaymentModal({onClose,onSuccess,member,year,addToast}){
  const [step,setStep]=useState("confirm");
  const [card,setCard]=useState("");
  const [exp,setExp]=useState("");
  const [cvv,setCvv]=useState("");

  const pay=()=>{
    setStep("processing");
    setTimeout(()=>{
      setStep("success");
      setTimeout(()=>{onSuccess(year);addToast(`✅ Payment of R${MEMBERSHIP_FEE} successful! ${year} membership activated.`,"success");onClose();},2000);
    },2000);
  };

  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        {step==="confirm"&&(<>
          <div style={{fontSize:12,color:"var(--muted)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8}}>Membership Payment</div>
          <div className="modal-title">PAY NOW</div>
          <div className="card" style={{marginTop:20,marginBottom:20,background:"var(--dark)"}}>
            {[["Member",`${member.firstName} ${member.surname}`],["Year",year],["Valid Until",`31 Dec ${year}`],["Amount",`R${MEMBERSHIP_FEE}.00`]].map(([k,v])=>(
              <div key={k} className="detail-row"><span className="detail-key">{k}</span><span className="detail-val">{v}</span></div>
            ))}
          </div>
          <div style={{display:"flex",gap:12}}>
            <button className="btn btn-ghost" style={{flex:1}} onClick={onClose}>Cancel</button>
            <button className="btn btn-primary" style={{flex:1}} onClick={()=>setStep("paystack")}>Proceed →</button>
          </div>
        </>)}

        {step==="paystack"&&(<>
          <div className="paystack-card">
            <div style={{fontWeight:800,fontSize:20,letterSpacing:-0.5,marginBottom:8,opacity:0.9}}>paystack</div>
            <div style={{fontSize:12,opacity:0.7,marginBottom:16}}>🔒 Sandbox / Demo Mode — no real charge</div>
            <div style={{marginBottom:12}}>
              <div style={{fontSize:11,opacity:0.8,marginBottom:4}}>CARD NUMBER</div>
              <input style={{width:"100%",background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.3)",borderRadius:6,padding:"10px 12px",color:"white",fontFamily:"DM Mono,monospace",fontSize:15,outline:"none"}} placeholder="4084 0840 8408 4081" value={card} onChange={e=>setCard(e.target.value.replace(/\D/g,"").replace(/(.{4})/g,"$1 ").trim().slice(0,19))}/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <div><div style={{fontSize:11,opacity:0.8,marginBottom:4}}>EXPIRY</div><input style={{width:"100%",background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.3)",borderRadius:6,padding:"10px 12px",color:"white",fontFamily:"DM Mono,monospace",fontSize:15,outline:"none"}} placeholder="12/27" value={exp} onChange={e=>setExp(e.target.value)}/></div>
              <div><div style={{fontSize:11,opacity:0.8,marginBottom:4}}>CVV</div><input style={{width:"100%",background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.3)",borderRadius:6,padding:"10px 12px",color:"white",fontFamily:"DM Mono,monospace",fontSize:15,outline:"none"}} placeholder="123" value={cvv} onChange={e=>setCvv(e.target.value)} maxLength={3}/></div>
            </div>
          </div>
          <div style={{display:"flex",gap:12}}>
            <button className="btn btn-ghost" onClick={()=>setStep("confirm")}>← Back</button>
            <button className="btn btn-primary" style={{flex:1}} onClick={pay}>Pay R{MEMBERSHIP_FEE} →</button>
          </div>
          <p style={{fontSize:11,color:"var(--muted)",marginTop:10,textAlign:"center"}}>Any card number works in demo mode</p>
        </>)}

        {step==="processing"&&(
          <div style={{textAlign:"center",padding:"40px 0"}}>
            <div style={{fontSize:52,marginBottom:16,animation:"pulse 1s infinite"}}>💳</div>
            <div style={{fontFamily:"Bebas Neue,sans-serif",fontSize:28,marginBottom:8}}>PROCESSING</div>
            <div style={{color:"var(--muted)",fontSize:14}}>Contacting Paystack — please wait...</div>
          </div>
        )}

        {step==="success"&&(
          <div style={{textAlign:"center",padding:"40px 0"}}>
            <div style={{width:72,height:72,background:"rgba(74,222,128,0.15)",border:"2px solid var(--green)",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 20px",color:"var(--green)",fontSize:32}}><I n="check"/></div>
            <div style={{fontFamily:"Bebas Neue,sans-serif",fontSize:36,color:"var(--green)",marginBottom:8}}>PAYMENT SUCCESSFUL</div>
            <div style={{color:"var(--muted)",fontSize:14}}>Your {year} membership is now active!</div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── MEMBER DASHBOARD ────────────────────────────────────────
function MemberDashboard({user,updateMember,addToast,simMonth}){
  const [showPay,setShowPay]=useState(false);
  const [targetYear,setTargetYear]=useState(CURRENT_YEAR);
  const [tab,setTab]=useState("overview");

  const [editForm,setEditForm]=useState({...user});

  const paid25 = user.paidYear===CURRENT_YEAR-1;

  const handlePaySuccess=yr=>{
    updateMember(user.id,{status:"paid",paidYear:yr,paymentDate:new Date().toISOString().split("T")[0]});

  const saveProfile=()=>{
    updateMember(user.id,editForm);

              <span className={`badge ${paid26?"badge-paid":"badge-unpaid"}`}>{paid26?"✓ Paid":"✗ Unpaid"}</span>

              <div style={{fontSize:13,color:"var(--muted)"}}>Secure your {CURRENT_YEAR+1} membership now for only R{MEMBERSHIP_FEE} — early bird pricing!</div>
            </div>
            <button className="btn btn-primary btn-sm" onClick={()=>{setTargetYear(CURRENT_YEAR+1);setShowPay(true);}}>Renew Now</button>

                <div className="metric-val" style={{color:paid26?"var(--green)":"var(--red)"}}>{paid26?"ACTIVE":"INACTIVE"}</div>
                <div style={{fontSize:13,color:"var(--muted)"}}>Year {CURRENT_YEAR}</div>

              <div className="metric-card">
                <div className="metric-label">Paid Year</div>
                <div className="metric-val" style={{color:"var(--accent)"}}>{user.paidYear||"—"}</div>

              <div className="metric-card">
                <div className="metric-label">Payment Date</div>

                ?<div className="alert alert-warning"><I n="alert"/><div><strong>Your membership has lapsed.</strong><div style={{fontSize:13,marginTop:2}}>You paid for {CURRENT_YEAR-1} but have not renewed for {CURRENT_YEAR}. Please pay to participate in rides.</div></div></div>

                  <td style={{fontFamily:"DM Mono,monospace",fontSize:13}}>{fmt(user.paymentDate)}</td>

                  <td style={{fontFamily:"DM Mono,monospace"}}>R{MEMBERSHIP_FEE}.00</td>

              :<div className="card" style={{textAlign:"center",padding:"48px 24px",color:"var(--muted)"}}>

              </div>

          <div className="fade-up">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <h3 style={{fontWeight:600}}>Profile Details</h3>

                ?<button className="btn btn-ghost btn-sm" onClick={()=>setEditMode(true)}>Edit Profile</button>

                [["Full Name",`${user.firstName} ${user.surname}`],["Email",user.email],["Phone",user.phone],["Address",user.address],["Emergency Contact",`${user.emergencyName} — ${user.emergencyPhone}`],["Next of Kin",`${user.nokName} (${user.nokRelationship}) — ${user.nokPhone}`],["Medical Info",user.medical||"None provided"]].map(([k,v])=>(

      {showPay&&<PaymentModal onClose={()=>setShowPay(false)} onSuccess={handlePaySuccess} member={user} year={targetYear} addToast={addToast}/>}

  );

// ── ADMIN DASHBOARD ─────────────────────────────────────────
function AdminDashboard({members,updateMember,addToast}){
  const [filter,setFilter]=useState("all");
  const [yearF,setYearF]=useState("all");
  const [search,setSearch]=useState("");
  const [sel,setSel]=useState(null);
  const [tab,setTab]=useState("members");

  const rows=members.filter(m=>{
    if(filter==="paid"&&m.paidYear!==CURRENT_YEAR)return false;
    if(filter==="unpaid"&&m.paidYear===CURRENT_YEAR)return false;
    if(yearF!=="all"&&String(m.paidYear)!==yearF)return false;
    if(search&&!`${m.firstName} ${m.surname} ${m.email}`.toLowerCase().includes(search.toLowerCase()))return false;
    return true;
  });

  const totalPaid=members.filter(m=>m.paidYear===CURRENT_YEAR).length;
  const totalUnpaid=members.length-totalPaid;

  const exportCSV=()=>{
    const hdr=["Name","Email","Phone","Status","PaidYear","PaymentDate"];
    const data=rows.map(m=>[`${m.firstName} ${m.surname}`,m.email,m.phone,m.paidYear===CURRENT_YEAR?"Paid":"Unpaid",m.paidYear||"",m.paymentDate||""]);
    const csv=[hdr,...data].map(r=>r.join(",")).join("\n");
    const a=document.createElement("a");
    a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
    a.download="pcc-members.csv";a.click();
    addToast("CSV exported.","success");
  };

  return(
    <div className="dash-layout">
      <div className="dash-content">
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12,marginBottom:32}}>
          <div>
            <div style={{fontFamily:"Bebas Neue,sans-serif",fontSize:36}}>ADMIN DASHBOARD</div>
            <div style={{color:"var(--muted)",fontSize:14}}>Plett Cycling Club — {CURRENT_YEAR}</div>
          </div>
          <span className="badge badge-admin"><I n="crown"/> Admin</span>
        </div>

        {/* Metrics */}
        <div className="dash-grid" style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:16,marginBottom:32}}>
          {[{l:"Total Members",v:members.length,c:"var(--text)"},{l:`Paid ${CURRENT_YEAR}`,v:totalPaid,c:"var(--green)"},{l:"Unpaid / Lapsed",v:totalUnpaid,c:"var(--red)"},{l:`Revenue ${CURRENT_YEAR}`,v:`R${(totalPaid*MEMBERSHIP_FEE).toLocaleString()}`,c:"var(--accent)"}].map(m=>(
            <div key={m.l} className="metric-card"><div className="metric-val" style={{color:m.c}}>{m.v}</div><div className="metric-label">{m.l}</div></div>
          ))}
        </div>

        {/* Tabs */}
        <div className="tab-bar">
          {[["members","Members"],["reminders","Renewal Reminders"],["analytics","Analytics"]].map(([k,l])=>(
            <button key={k} className={`tab-btn${tab===k?" active":""}`} onClick={()=>setTab(k)}>{l}</button>
          ))}
        </div>

        {tab==="members"&&(
          <>
            <div style={{display:"flex",gap:10,marginBottom:20,flexWrap:"wrap",alignItems:"center"}}>
              <input className="form-input" placeholder="Search..." value={search} onChange={e=>setSearch(e.target.value)} style={{maxWidth:240}}/>
              {["all","paid","unpaid"].map(f=><button key={f} className={`btn btn-sm ${filter===f?"btn-primary":"btn-ghost"}`} onClick={()=>setFilter(f)}>{f.charAt(0).toUpperCase()+f.slice(1)}</button>)}
              <select className="form-input" style={{maxWidth:150}} value={yearF} onChange={e=>setYearF(e.target.value)}>
                <option value="all">All Years</option>
                {[CURRENT_YEAR,CURRENT_YEAR-1,CURRENT_YEAR-2].map(y=><option key={y} value={y}>{y}</option>)}
              </select>
              <button className="btn btn-ghost btn-sm" style={{marginLeft:"auto"}} onClick={exportCSV}><I n="download"/> Export CSV</button>
            </div>
            <div className="card" style={{padding:0}}>
              <div className="table-wrap">
                <table>
                  <thead><tr><th>Member</th><th>Phone</th><th>Status</th><th>Paid Year</th><th>Payment Date</th><th>Role</th><th>Actions</th></tr></thead>
                  <tbody>
                    {rows.map(m=>(
                      <tr key={m.id}>
                        <td><div style={{fontWeight:500}}>{m.firstName} {m.surname}</div><div style={{fontSize:12,color:"var(--muted)"}}>{m.email}</div></td>
                        <td style={{fontSize:13,color:"var(--muted)"}}>{m.phone}</td>
                        <td><span className={`badge ${m.paidYear===CURRENT_YEAR?"badge-paid":"badge-unpaid"}`}>{m.paidYear===CURRENT_YEAR?"Paid":"Unpaid"}</span></td>
                        <td style={{fontFamily:"DM Mono,monospace",fontSize:13}}>{m.paidYear||"—"}</td>
                        <td style={{fontFamily:"DM Mono,monospace",fontSize:13}}>{fmt(m.paymentDate)}</td>
                        <td>{m.isAdmin?<span className="badge badge-admin">Admin</span>:<span style={{fontSize:13,color:"var(--muted)"}}>Member</span>}</td>
                        <td>
                          <div style={{display:"flex",gap:6}}>
                            <button className="btn btn-sm btn-ghost" title="View details" onClick={()=>setSel(m)}><I n="eye"/></button>
                            {!m.isAdmin&&<button className="btn btn-sm btn-ghost" title="Promote to Admin" onClick={()=>{updateMember(m.id,{isAdmin:true});addToast(`${m.firstName} promoted to Admin.`,"success");}}><I n="crown"/></button>}
                          </div>
                        </td>
                      </tr>
                    ))}
                    {rows.length===0&&<tr><td colSpan={7} style={{textAlign:"center",color:"var(--muted)",padding:"36px"}}>No members match current filters.</td></tr>}
                  </tbody>
                </table>
              </div>
            </div>
          </>
        )}

        {tab==="reminders"&&(
          <div className="fade-up">
            <div className="alert alert-info"><I n="bell"/><div><strong>Renewal Reminder System</strong><div style={{fontSize:13,marginTop:4}}>Shows how automated reminders are triggered. In production, emails are sent at scheduled dates.</div></div></div>
            <h3 style={{fontWeight:600,marginBottom:16}}>Reminder Schedule</h3>
            <div style={{display:"grid",gap:12,marginBottom:32}}>
              {[
                {t:"1 October",ev:"Next year memberships open",tg:"All paid current-year members",msg:`"Plett Cycling Club ${CURRENT_YEAR+1} memberships are now open! Renew early and secure your spot."`},
                {t:"1 November",ev:"First renewal reminder",tg:"Members not yet renewed for next year",msg:`"Reminder: ${CURRENT_YEAR+1} memberships are open. Renew now for uninterrupted access."`},
                {t:"1 December",ev:"Final renewal push",tg:"Members not yet renewed for next year",msg:`"Last chance! ${CURRENT_YEAR+1} renewal closes 31 Dec. Don't lose your spot."`},
                {t:"31 January",ev:"Lapse notice",tg:"Members who haven't renewed",msg:`"Your ${CURRENT_YEAR} membership has lapsed. Pay now to rejoin club rides."`},
              ].map(r=>(
                <div key={r.t} className="card">
                  <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
                    <div style={{background:"rgba(232,255,62,0.1)",border:"1px solid rgba(232,255,62,0.2)",borderRadius:8,padding:"5px 12px",fontSize:12,fontFamily:"DM Mono,monospace",color:"var(--accent)",whiteSpace:"nowrap",alignSelf:"flex-start"}}>{r.t}</div>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:600,marginBottom:4}}>{r.ev}</div>
                      <div style={{fontSize:13,color:"var(--muted)",marginBottom:8}}>Target: {r.tg}</div>

                    </div>
                  </div>
                </div>
              ))}
            </div>
            <h3 style={{fontWeight:600,marginBottom:16}}>Members Needing Reminder ({CURRENT_YEAR})</h3>
            <div className="card" style={{padding:0}}>
              <div className="table-wrap">
                <table>
                  <thead><tr><th>Member</th><th>Email</th><th>Last Paid</th><th>Action</th></tr></thead>
                  <tbody>
                    {members.filter(m=>m.paidYear!==CURRENT_YEAR).map(m=>(
                      <tr key={m.id}>
                        <td>{m.firstName} {m.surname}</td>
                        <td style={{fontSize:13,color:"var(--muted)"}}>{m.email}</td>
                        <td style={{fontFamily:"DM Mono,monospace",fontSize:13}}>{m.paidYear||"Never"}</td>
                        <td><button className="btn btn-sm btn-ghost" onClick={()=>addToast(`📧 Reminder sent to ${m.firstName} ${m.surname}`,"success")}><I n="bell"/> Send Reminder</button></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        )}

        {tab==="analytics"&&(
          <div className="fade-up">
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:24}}>
              <div className="card">
                <h3 style={{fontWeight:600,marginBottom:20}}>Membership Distribution</h3>
                {[{l:`Paid ${CURRENT_YEAR}`,n:totalPaid,c:"var(--green)"},{l:`Unpaid ${CURRENT_YEAR}`,n:totalUnpaid,c:"var(--red)"}].map(x=>(
                  <div key={x.l} style={{marginBottom:16}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:6,fontSize:13}}>
                      <span style={{color:"var(--muted)"}}>{x.l}</span>
                      <span style={{fontFamily:"DM Mono,monospace"}}>{x.n} / {members.length}</span>
                    </div>
                    <div style={{height:8,background:"var(--dark)",borderRadius:4,overflow:"hidden"}}>
                      <div style={{height:"100%",width:`${(x.n/members.length)*100}%`,background:x.c,borderRadius:4}}/>
                    </div>
                  </div>
                ))}
              </div>
              <div className="card">
                <h3 style={{fontWeight:600,marginBottom:20}}>Revenue Summary</h3>
                {[["Collected",`R${(totalPaid*MEMBERSHIP_FEE).toLocaleString()}`],["Outstanding",`R${(totalUnpaid*MEMBERSHIP_FEE).toLocaleString()}`],["Total Potential",`R${(members.length*MEMBERSHIP_FEE).toLocaleString()}`],["Collection Rate",`${Math.round((totalPaid/members.length)*100)}%`]].map(([k,v])=>(
                  <div key={k} className="detail-row"><span className="detail-key">{k}</span><span style={{fontFamily:"DM Mono,monospace",fontSize:16,color:"var(--accent)"}}>{v}</span></div>
                ))}
              </div>
            </div>
            <div className="card" style={{marginTop:24}}>
              <h3 style={{fontWeight:600,marginBottom:20}}>Payment Timeline — {CURRENT_YEAR}</h3>
              <div className="bar-wrap">
                {MONTHS.map((m,i)=>{
                  const cnt=members.filter(mem=>{
                    if(!mem.paymentDate)return false;
                    const d=new Date(mem.paymentDate);
                    return d.getFullYear()===CURRENT_YEAR&&d.getMonth()===i;
                  }).length;
                  const h=cnt>0?Math.max((cnt/members.length)*100,14):4;
                  return(
                    <div key={m} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center"}}>
                      <div className="bar" style={{width:"100%",height:`${h}%`,background:cnt>0?"var(--accent)":"var(--border)"}}/>
                      <div className="bar-label">{m}</div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        )}
      </div>

      {/* Member Detail Modal */}
      {sel&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setSel(null)}>
          <div className="modal" style={{maxWidth:500}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
              <div>
                <div className="modal-title">{sel.firstName.toUpperCase()} {sel.surname.toUpperCase()}</div>
                <div style={{display:"flex",gap:8,marginTop:6}}>
                  <span className={`badge ${sel.paidYear===CURRENT_YEAR?"badge-paid":"badge-unpaid"}`}>{sel.paidYear===CURRENT_YEAR?"Paid":"Unpaid"}</span>
                  {sel.isAdmin&&<span className="badge badge-admin">Admin</span>}
                </div>
              </div>
              <button className="btn btn-ghost btn-sm" onClick={()=>setSel(null)}><I n="x"/></button>
            </div>
            {[["Email",sel.email],["Phone",sel.phone],["Address",sel.address],["Emergency Contact",`${sel.emergencyName} — ${sel.emergencyPhone}`],["Next of Kin",`${sel.nokName} (${sel.nokRelationship})`],["NOK Phone",sel.nokPhone],["Medical Info",sel.medical||"None"],["Paid Year",sel.paidYear||"Not paid"],["Payment Date",fmt(sel.paymentDate)]].map(([k,v])=>(
              <div key={k} className="detail-row"><span className="detail-key">{k}</span><span className="detail-val">{v}</span></div>
            ))}
            {!sel.isAdmin&&<button className="btn btn-ghost btn-sm" style={{marginTop:16,width:"100%"}} onClick={()=>{updateMember(sel.id,{isAdmin:true});addToast(`${sel.firstName} promoted to Admin.`,"success");setSel(null);}}><I n="crown"/> Promote to Admin</button>}
          </div>
        </div>
      )}
    </div>
  );
}

// ── ROOT APP ────────────────────────────────────────────────
function App(){
  const [page,setPage]     = useState("home");
  const [user,setUser]     = useState(null);
  const [members,setMembers] = useState(DUMMY_MEMBERS);
  const [toasts,setToasts] = useState([]);
  const [simMonth,setSimMonth] = useState(new Date().getMonth());

  const addToast=(msg,type="info")=>{
    const id=Date.now();
    setToasts(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),4000);
  };

  const logout=()=>{setUser(null);setPage("home");addToast("Logged out.","info");};

  const addMember=data=>{
    const m={...data,id:Date.now()};
    setMembers(ms=>[...ms,m]);
  };

  const updateMember=(id,updates)=>{
    setMembers(ms=>ms.map(m=>{
      if(m.id!==id)return m;
      const u={...m,...updates};
      if(user&&user.id===id)setUser(u);
      return u;
    }));
  };

  // Guard routes
  useEffect(()=>{
    if(!user&&(page==="dashboard"||page==="admin"))setPage("login");
    if(user&&page==="admin"&&!user.isAdmin)setPage("dashboard");
  },[page,user]);

  const sp={setPage,addToast};

  return(
    <>
      <Navbar page={page} setPage={setPage} user={user} logout={logout}/>
      <main style={{paddingBottom:72}}>
        {page==="home"    && <HomePage {...sp}/>}
        {page==="about"   && <AboutPage/>}
        {page==="gallery" && <GalleryPage/>}
        {page==="join"    && <SignupPage {...sp} addMember={addMember}/>}
        {page==="contact" && <ContactPage {...sp}/>}
        {page==="login"   && <LoginPage {...sp} members={members} setUser={setUser}/>}
        {page==="dashboard"&&user&&<MemberDashboard user={user} updateMember={updateMember} addToast={addToast} simMonth={simMonth}/>}
        {page==="admin"   &&user?.isAdmin&&<AdminDashboard members={members} updateMember={updateMember} addToast={addToast}/>}
      </main>
      <DemoBar simMonth={simMonth} setSimMonth={setSimMonth} setPage={setPage} setUser={setUser} members={members}/>
      <Toasts toasts={toasts}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
